# STT placeholders: {audio} (input wav), {transcript} (output .txt), {transcript_base} ({transcript} minus .txt).
# TTS placeholders: {output} (output wav); the text to speak arrives on stdin.
# whisper.cpp example:
# stt_command = ["C:\\tools\\whisper\\whisper-cli.exe", "-m", "C:\\models\\ggml-base.en.bin", "-f", "{audio}", "-otxt", "-of", "{transcript_base}"]
# piper example:
# tts_command = ["C:\\tools\\piper\\piper.exe", "--model", "C:\\models\\en_US-lessac-medium.onnx", "--output_file", "{output}"]
stt_command = []
tts_command = []
timeout_seconds = 120.0
