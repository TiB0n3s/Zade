[app]
host = "127.0.0.1"
port = 8787

[identity]
name = "Zade"
description = "Local-first AI co-founder and private operating partner."

[paths]
hot_root = "C:\\AI Brain"
cold_root = "D:\\AI Brain-Cold"
data_dir = "C:\\AI Brain\\memory-hot\\cofounder-kernel"

[ollama]
base_url = "http://127.0.0.1:11434"
chat_model = "qwen3:14b"
reasoning_model = "deepseek-r1:14b"
coding_model = "qwen2.5-coder:14b"
embedding_model = "nomic-embed-text"
think = false
temperature = 0.2
# Agentic investigation loop: the chat model can call whitelisted read-only
# tools (trading-bot status/changes/activity/signals/events, memory search)
# before answering. Each round is a full model call; max_rounds bounds latency.
tool_loop = true
tool_loop_max_rounds = 3

# ---- provider policy (local-first; the default is local_only) ----
# local_only:      ONLY loopback Ollama (127.0.0.1/localhost/::1) and verified
#                  local models. Cloud providers (api.anthropic.com,
#                  api.openai.com), Ollama Cloud (ollama.com, *-cloud models),
#                  and remote Ollama hosts are refused at the transport layer
#                  BEFORE any bytes leave the process. No fallback, ever: a
#                  local failure is reported as a local failure.
# local_preferred: local first; cloud still needs explicit per-request
#                  authorization. Never an automatic fallback.
# cloud_allowed:   cloud possible only when allow_cloud_inference below is true
#                  AND the request explicitly opts in. An installed API key
#                  NEVER counts as authorization and never changes routing.
provider_policy = "local_only"
allow_remote_ollama = false
allow_ollama_cloud = false
allow_cloud_inference = false
cloud_fallback = "never"
# Native coding agent model (the tool-calling build loop). Leave empty to
# resolve automatically: the kernel probes coding_model then chat_model for
# NATIVE tool-call support (declared capabilities are unreliable — probe truth
# via GET /models/inventory?probe=true) and fails with the installed candidates
# if none passes. Set explicitly to pin it, e.g. "qwen3:14b".
coding_agent_model = ""
# Verify the effective posture at runtime: GET /providers/status shows the
# active policy, endpoint host, per-role models, whether Ollama Cloud is
# disabled (set OLLAMA_NO_CLOUD=1 in Ollama's environment for a hard server-
# side guarantee), and the provider/model used by the most recent request.
# Note: cloud SPEECH engines ([voice] deepgram/elevenlabs) and approved web
# research fetches are external DATA tools under their own permission gates —
# they are not model inference and are not authorized by any llm policy.

[security]
local_token = ""
protect_mutations = true
# Dev-only cross-origin allowlist. Empty (default) keeps the same-origin,
# no-CORS loopback posture. Set this ONLY when serving the UI from a separate
# dev server (e.g. Vite on http://localhost:5173) that must call the kernel.
# Guardrails: "*" and any non-loopback origin are refused at startup with a
# loud SECURITY warning. Env override: COFOUNDER_CORS_DEV_ORIGINS (comma-sep).
# cors_dev_origins = ["http://localhost:5173"]

[skills]
source_dir = "C:\\LocalAICofounder\\.agents\\skills"
lock_file = "C:\\LocalAICofounder\\skills-lock.json"
enable_defaults = true
max_prompt_chars = 1800

[prompt_profiles]
# Active Zade prompt profile when a request or conversation does not override it.
# Valid: general, build, expert, account, api, companion, dark-comedian,
# loyal-confidant, study-mentor, medical-information, therapeutic-support.
default = "general"

[voice]
# Engines: "command" runs local argv arrays (no shell); "deepgram" (STT) and
# "elevenlabs" (TTS) call your cloud speech APIs. Selecting a cloud engine is a
# standing grant: audio and reply text leave the machine. API keys are read
# from the environment variables below and are never stored in this file.
stt_engine = "command"   # "command" | "deepgram"
tts_engine = "command"   # "command" | "elevenlabs"

# Cloud engine settings (used when the engine above is deepgram/elevenlabs):
stt_api_key_env = "DEEPGRAM_API_KEY"
stt_model = "nova-2"
tts_api_key_env = "ELEVENLABS_API_KEY"
tts_model = "eleven_turbo_v2_5"
tts_voice = "21m00Tcm4TlvDq8ikWAM"

# Local command engines as argv arrays. Leave empty to disable.
# STT placeholders: {audio} (input wav), {transcript} (output .txt), {transcript_base} ({transcript} minus .txt).
# TTS placeholders: {output} (output wav); the text to speak arrives on stdin.
# whisper.cpp example:
# stt_command = ["C:\\tools\\whisper\\whisper-cli.exe", "-m", "C:\\models\\ggml-base.en.bin", "-f", "{audio}", "-otxt", "-of", "{transcript_base}"]
# piper example:
# tts_command = ["C:\\tools\\piper\\piper.exe", "--model", "C:\\models\\en_US-lessac-medium.onnx", "--output_file", "{output}"]
stt_command = []
tts_command = []
timeout_seconds = 120.0

[trading_bot]
# Local, authority-safe bridge into the existing bot advisory lane.
# Zade can run a small allowlist of read-only ops checks and can queue
# approval-gated advisory recommendations into dt_recommendations.
enabled = true
wsl_distro = "Ubuntu-TradingBot-C"
repo_path = "/home/tradingbot/trading-bot"
python = "./venv/bin/python"
timeout_seconds = 120.0

[devtools]
# The repo Zade may act in through approved developer action handlers
# (dev.command.run, dev.git.branch, dev.git.commit, dev.draft.write). Every
# action still requires approval + the typed confirmation phrase; this just
# bounds where those actions run. Point it at whichever repo you want Zade to
# help with. Defaults to the kernel's own project root.
workspace_root = "C:\\LocalAICofounder"
default_branch = "main"
command_timeout_seconds = 300.0

[delegation]
# Delegated build work (swarm, frontier half). A founder chat command like
# "build me a book-cataloguing app" or "build this out for me" packages a
# scoped brief and queues an approval-gated run. workspace_root confines where
# builds happen — keep it OUTSIDE this repo.
#
# engine selects the implementation (NO automatic fallback between them):
#   native (default) — Zade's own coding-agent loop on the local Ollama model
#            ([ollama] coding_agent_model): build profile as system message,
#            real workspace tools (list/read/search/edit/run tests/git),
#            bounded rounds, all audited. No external process, no cloud.
#   bridge — run agent_command as a LOCAL COMPATIBILITY BRIDGE. Under a local
#            provider policy its environment is sanitized: ANTHROPIC_BASE_URL
#            is forced to the loopback Ollama Anthropic-compatible API,
#            ANTHROPIC_AUTH_TOKEN=ollama, ANTHROPIC_API_KEY is stripped, and
#            the explicit local model is set. Claude Code is NOT required for
#            the default local coding path.
#   brief  — prepare-not-send: package the brief only.
enabled = true
engine = "native"
auto_invoke = true
agent_command = ["claude", "-p", "--permission-mode", "acceptEdits"]
daily_budget = 25
timeout_seconds = 1800
max_output_chars = 40000
workspace_root = "C:\\Users\\you\\ZadeWorkspace"

[build]
# Local-first build sessions assess complexity without cloud use, then ask for
# one time- and spend-bounded lease before any paid model request. The limits
# are hard ceilings, not spending targets.
enabled = true
warning_percent = 80
provider_overhead_tokens = 1024

[build.tiers.small]
dollar_micro = 1000000
input_tokens = 120000
output_tokens = 16000
cloud_turns = 6
duration_seconds = 7200

[build.tiers.medium]
dollar_micro = 3000000
input_tokens = 400000
output_tokens = 40000
cloud_turns = 16
duration_seconds = 14400

[build.tiers.large]
dollar_micro = 7000000
input_tokens = 1000000
output_tokens = 80000
cloud_turns = 32
duration_seconds = 28800

[build.anthropic_pricing]
# Local pricing snapshots fail closed after review_after. Refresh deliberately;
# Zade never downloads or guesses pricing at runtime.
model = "claude-opus-4-8"
base_input_per_mtok = "5"
cache_write_5m_per_mtok = "6.25"
cache_write_1h_per_mtok = "10"
cache_read_per_mtok = "0.5"
output_per_mtok = "25"
review_after = "2026-08-31"
