# Zade local overrides. Only sections present here override built-in defaults;
# see config.example.toml for everything that can be configured.

[security]
# Dev-only: browser origins allowed to call the kernel cross-origin. Needed only
# when the UI is served from a separate dev server (e.g. Vite) instead of the
# kernel's own /ui mount. Non-loopback origins and "*" are refused at startup.
# Remove this line for the default same-origin (no-CORS) posture.
cors_dev_origins = ["http://localhost:5173"]

[ollama]
# Chat/voice sampling temperature. Default is 0.2 (deterministic, flat). Raised so
# the charter voice has room for texture and doesn't repeat the same phrasing.
temperature = 0.6
# Provider policy. local_preferred: loopback Ollama is still the default for all
# model inference, but the data-class egress gate (see [egress] and egress.py) is
# now live — cloud egress is permitted ONLY for the classes/vendors granted below
# or authorized per-request, and never as an automatic fallback. Raised off
# local_only on 2026-07-17 to re-enable the cloud voice engines via an explicit
# standing grant; model inference stays local.
provider_policy = "local_preferred"
# Native coding agent model. Probed 2026-07-16: qwen3:14b is the only installed
# model that emits NATIVE tool_calls (qwen2.5-coder:14b and deepseek-r1:14b
# declare "tools" but return JSON-as-text / prose from a live probe).
coding_agent_model = "qwen3:14b"

[delegation]
# Delegated build work runs on the NATIVE local coding agent by default:
# Zade's own tool loop on the local Ollama model ([ollama] coding_agent_model).
# No external agent process, no cloud. Set engine = "bridge" to run the CLI
# below instead — under a local provider policy it launches with a sanitized
# environment pointed at the loopback Ollama Anthropic-compatible API
# (ANTHROPIC_BASE_URL=http://127.0.0.1:11434, AUTH_TOKEN=ollama, no API key).
engine = "native"
# Local compatibility bridge CLI (used only when engine = "bridge").
# Full path: Windows CreateProcess can't resolve the bare npm "claude" shim.
agent_command = ["C:\\Users\\TiBon\\AppData\\Roaming\\npm\\node_modules\\@anthropic-ai\\claude-code\\bin\\claude.exe", "-p", "--permission-mode", "acceptEdits"]
# Delegated builds run HERE, never inside the kernel repo.
workspace_root = "C:\\Users\\TiBon\\ZadeWorkspace"
# Real builds need more than 10 minutes.
timeout_seconds = 1800
max_output_chars = 40000

[voice]
# Local speech engines: whisper.cpp (STT) + piper (TTS), run as argv command
# templates WITHOUT a shell — nothing leaves the machine for voice. STT
# placeholders: {audio} (input wav) and {transcript}/{transcript_base} (output);
# the kernel reads {transcript_base}.txt. TTS: the text to speak arrives on stdin
# and {output} is the wav to write. To use cloud voice instead, set stt_engine =
# "deepgram" / tts_engine = "elevenlabs" AND re-add the matching [egress] standing
# grants below (keys are read from DEEPGRAM_API_KEY / ELEVENLABS_API_KEY, never
# written here).
stt_engine = "command"
tts_engine = "command"
# Model: small.en (466MB) — upgraded from base.en (142MB), which misheard
# uncommon/domain words ("governance" -> "Government's"). base.en is kept on disk
# as a fallback: swap the -m path back if small.en's latency becomes a problem.
stt_command = ["C:/tools/whisper/Release/whisper-cli.exe", "-m", "C:/tools/whisper/ggml-small.en.bin", "-f", "{audio}", "-otxt", "-of", "{transcript_base}", "-nt"]
tts_command = ["C:/tools/piper/piper/piper.exe", "--model", "C:/tools/piper/en_US-amy-medium.onnx", "--output_file", "{output}"]
# tts_voice is ElevenLabs-only and unused by the local command engine:
# tts_voice = "ZthjuvLPty3kTMaNKVKb"

[egress]
# Data-class egress gate standing grants (see EGRESS-DESIGN.md). Each entry durably
# permits one (data_class, vendor) cloud egress. Voice is now fully local (whisper.cpp
# + piper), so the founder_audio:deepgram and reply_text:elevenlabs grants are removed —
# the egress gate now REFUSES any cloud voice attempt (fail-closed). Re-add them (and set
# the cloud engines above) to restore cloud voice. Raw founder_state can never be granted
# here — it is FORBIDDEN in the matrix regardless.
standing_grants = ["public_derived:public_web"]

[anthropic]
# Cloud strategic review via Anthropic — the on-switch for the first cloud egress
# of a curated founder_brief. Enabled 2026-07-17. A send STILL requires all of:
# provider_policy != local_only (above), ANTHROPIC_API_KEY in the env, AND a
# per-request founder grant (typed-phrase approval of a specific review). Raw
# founder_state remains FORBIDDEN by the egress matrix regardless of this flag.
enabled = true

[openclaw]
# Channel-gateway bridge. Connects to the LOCAL OpenClaw gateway's WebSocket as
# an operator client, routes inbound channel messages (Telegram, etc.) through
# the governed /channels/message flow (channel auth + capped authority + HMAC),
# and sends Zade's reply back. Enabled 2026-07-18. The gateway token is read from
# OPENCLAW_GATEWAY_TOKEN (never written here). Loopback-only unless
# allow_remote_gateway is set. A channel must still be connected on the OpenClaw
# side (`openclaw channels add --channel telegram --token <bot-token>`) before
# any real message flows — the bridge is the transport, not the channel account.
enabled = true
ws_url = "ws://127.0.0.1:18789"
token_env = "OPENCLAW_GATEWAY_TOKEN"
