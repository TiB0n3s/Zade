# Zade local overrides. Only sections present here override built-in defaults;
# see config.example.toml for everything that can be configured.

[security]
# Dev-only: browser origins allowed to call the kernel cross-origin. Needed only
# when the UI is served from a separate dev server (e.g. Vite) instead of the
# kernel's own /ui mount. Non-loopback origins and "*" are refused at startup.
# Remove this line for the default same-origin (no-CORS) posture.
cors_dev_origins = ["http://localhost:5173"]

[ollama]
# Chat/voice sampling temperature. Default is 0.2 (deterministic, flat). Raised so
# the charter voice has room for texture and doesn't repeat the same phrasing.
temperature = 0.6
# Provider policy. local_preferred: loopback Ollama is still the default for all
# model inference, but the data-class egress gate (see [egress] and egress.py) is
# now live — cloud egress is permitted ONLY for the classes/vendors granted below
# or authorized per-request, and never as an automatic fallback. Raised off
# local_only on 2026-07-17 to re-enable the cloud voice engines via an explicit
# standing grant; model inference stays local.
provider_policy = "local_preferred"
# Native coding agent model. Probed 2026-07-16: qwen3:14b is the only installed
# model that emits NATIVE tool_calls (qwen2.5-coder:14b and deepseek-r1:14b
# declare "tools" but return JSON-as-text / prose from a live probe).
coding_agent_model = "qwen3:14b"
# Read timeout (s) for a generate/chat/embed request. Non-streaming Ollama sends
# nothing until generation finishes, so this budget must cover a COLD start:
# loading a ~12GB model into VRAM (or a reload after eviction under
# OLLAMA_MAX_LOADED_MODELS) plus the generation. 180s (the old hardcoded value)
# was too tight for a cold load and produced spurious "Ollama request timed out"
# failures on the first message after idle. Health/version probes fail fast on a
# separate 15s timeout and are unaffected.
request_timeout_seconds = 600

[delegation]
# Hybrid builds assess and work locally first. Any Anthropic source-code turn
# requires a project-scoped, expiring lease approved with the typed phrase and
# is constrained by the configured token/dollar/turn ceilings. There is no paid
# retry, provider fallback, standing source-code grant, or automatic tier raise.
engine = "hybrid"
# Local compatibility bridge CLI (used only when engine = "bridge").
# Full path: Windows CreateProcess can't resolve the bare npm "claude" shim.
agent_command = ["C:\\Users\\TiBon\\AppData\\Roaming\\npm\\node_modules\\@anthropic-ai\\claude-code\\bin\\claude.exe", "-p", "--permission-mode", "acceptEdits"]
# Delegated builds run HERE, never inside the kernel repo.
workspace_root = "C:\\Users\\TiBon\\ZadeWorkspace"
# Real builds need more than 10 minutes.
timeout_seconds = 1800
max_output_chars = 40000

[voice]
# Local speech engines: whisper.cpp (STT) + piper (TTS), run as argv command
# templates WITHOUT a shell — nothing leaves the machine for voice. STT
# placeholders: {audio} (input wav) and {transcript}/{transcript_base} (output);
# the kernel reads {transcript_base}.txt. TTS: the text to speak arrives on stdin
# and {output} is the wav to write. Voice is local-only: the cloud engines
# (deepgram/elevenlabs) were removed 2026-07-19 and their egress-matrix cells
# stay FORBIDDEN; restoring cloud voice is a deliberate rebuild, not a flip.
stt_engine = "command"
tts_engine = "command"
# Model: small.en (466MB) — upgraded from base.en (142MB), which misheard
# uncommon/domain words ("governance" -> "Government's"). base.en is kept on disk
# as a fallback: swap the -m path back if small.en's latency becomes a problem.
stt_command = ["C:/tools/whisper/Release/whisper-cli.exe", "-m", "C:/tools/whisper/ggml-small.en.bin", "-f", "{audio}", "-otxt", "-of", "{transcript_base}", "-nt"]
tts_command = ["C:/tools/piper/piper/piper.exe", "--model", "C:/tools/piper/en_US-amy-medium.onnx", "--output_file", "{output}"]

[egress]
# Data-class egress gate standing grants (see EGRESS-DESIGN.md). Each entry durably
# permits one (data_class, vendor) cloud egress. Voice is fully local (whisper.cpp
# + piper); the cloud-voice adapters were deleted 2026-07-19 and the matrix cells are
# FORBIDDEN, so no grant here can resurrect cloud voice. Raw founder_state can never
# be granted here — it is FORBIDDEN in the matrix regardless.
# reply_text:telegram authorizes Zade to reply to the founder's own bound Telegram
# chat (REPLY_TEXT leaving to api.telegram.org). Without it the Telegram adapter
# still binds inbound but sends no reply (fail-closed).
standing_grants = ["public_derived:public_web", "reply_text:telegram"]

[anthropic]
# Cloud strategic review via Anthropic — the on-switch for the first cloud egress
# of a curated founder_brief. Enabled 2026-07-17. A send STILL requires all of:
# provider_policy != local_only (above), ANTHROPIC_API_KEY in the env, AND a
# per-request founder grant (typed-phrase approval of a specific review). Raw
# founder_state remains FORBIDDEN by the egress matrix regardless of this flag.
enabled = true

[build]
# Durable lifecycle workers. Commands remain profile-generated, argv-only,
# workspace-confined, credential-stripped, time-bounded, and audited. Python
# and Node checks use Docker only when the exact pre-approved local image exists;
# Zade never pulls an image. Flutter and Android checks use narrow host policies.
enabled = true
max_workers = 2
ios_workflow = "ios.yml"

[openai_review]
# Optional independent review only. Disabled until the optional SDK and
# OPENAI_API_KEY are installed and a separate typed provider lease is approved.
# Requests use store=false and no hosted tools; OpenAI is never a fallback.
enabled = false
model = "gpt-5.6-terra"
api_key_env = "OPENAI_API_KEY"
max_output_tokens = 4000
reasoning_effort = "medium"

[openclaw]
# Channel-gateway bridge — RETIRED for Telegram (2026-07-18). OpenClaw turned out
# to be a full assistant that intercepts inbound messages with its own agent
# (default openai/gpt-5.5) rather than relaying them, so it can't be a dumb pipe
# for Zade. Disabled in favour of the direct [telegram] adapter below. The bridge
# code stays committed and dormant in case the hard channels (WhatsApp, iMessage,
# Signal) ever justify fighting OpenClaw into relay mode. Set enabled = true only
# then, and re-connect a channel on the OpenClaw side.
enabled = false
ws_url = "ws://127.0.0.1:18789"
token_env = "OPENCLAW_GATEWAY_TOKEN"

[telegram]
# Direct Telegram Bot API adapter — Zade's own channel transport, no OpenClaw.
# A background long-poll routes inbound messages through the governed
# /channels/message flow (channel auth + capped authority + HMAC) and replies via
# sendMessage. The bot token is read from TELEGRAM_BOT_TOKEN (never written here).
# Replies are gated by the reply_text:telegram standing grant in [egress] above:
# without it, inbound still binds but no reply leaves (fail-closed). Enabled
# 2026-07-18.
enabled = true
token_env = "TELEGRAM_BOT_TOKEN"
