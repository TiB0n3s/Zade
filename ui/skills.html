<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zade Skill Registry</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --panel: #0c0c0e;
      --panel-2: #121216;
      --line: rgba(255,255,255,0.08);
      --text: #eeeae5;
      --muted: #8a8a91;
      --accent: #b0473f;
      --accent-2: #d07d74;
      --ok: #5a8a72;
      --warn: #c69b5f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse 120% 90% at 30% -10%, #151012 0%, #09090a 45%, var(--bg) 100%);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 28px;
      border-bottom: 1px solid var(--line);
      background: rgba(5,5,6,0.76);
      position: sticky;
      top: 0;
      backdrop-filter: blur(16px);
      z-index: 10;
    }
    h1 { margin: 0; font: 600 20px/1.1 Georgia, serif; letter-spacing: 0.02em; }
    .sub { color: var(--muted); font-size: 12px; margin-top: 5px; }
    main { padding: 24px 28px 36px; display: grid; gap: 18px; }
    .toolbar, .route-box, .summary, .skill {
      background: rgba(12,12,14,0.9);
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; padding: 14px; align-items: center; }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 1px; overflow: hidden; }
    .metric { padding: 14px; background: rgba(255,255,255,0.02); }
    .metric strong { display: block; font-size: 22px; line-height: 1; margin-bottom: 5px; }
    .metric span { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
    input, select, textarea {
      background: #09090b;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 9px 10px;
      outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: rgba(208,125,116,0.65); }
    input[type="search"] { min-width: 260px; flex: 1; }
    button, a.button {
      border: 1px solid rgba(176,71,63,0.5);
      color: var(--text);
      background: rgba(176,71,63,0.12);
      border-radius: 4px;
      padding: 9px 12px;
      cursor: pointer;
      text-decoration: none;
      font: inherit;
    }
    button.secondary, a.button.secondary { border-color: var(--line); background: rgba(255,255,255,0.03); }
    button:disabled { opacity: 0.45; cursor: default; }
    .route-box { padding: 14px; display: grid; gap: 10px; }
    .route-row { display: grid; grid-template-columns: 1fr 140px auto; gap: 10px; }
    .notice { min-height: 20px; color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
    .skill { padding: 14px; display: grid; gap: 10px; min-height: 220px; }
    .skill-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .skill h2 { margin: 0; font-size: 15px; }
    .desc { color: #c9c5bf; min-height: 62px; }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 11px;
    }
    .pill.enabled { color: #d8f1e4; border-color: rgba(90,138,114,0.55); background: rgba(90,138,114,0.14); }
    .pill.approval_gated { color: #f1d9b2; border-color: rgba(198,155,95,0.55); background: rgba(198,155,95,0.12); }
    .pill.local_write { color: #f0c8c3; border-color: rgba(176,71,63,0.55); background: rgba(176,71,63,0.12); }
    .actions { display: flex; gap: 8px; margin-top: auto; }
    pre {
      margin: 0;
      max-height: 260px;
      overflow: auto;
      white-space: pre-wrap;
      background: #070708;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 12px;
      color: #d8d3cb;
    }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .summary { grid-template-columns: repeat(2, 1fr); }
      .route-row { grid-template-columns: 1fr; }
      input[type="search"] { min-width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Zade Skill Registry</h1>
      <div class="sub">Local operating procedures. Routed as guidance. Authority still governs action.</div>
    </div>
    <div>
      <a class="button secondary" href="/ui">Back to Zade</a>
      <button id="scanBtn">Scan Skills</button>
    </div>
  </header>

  <main>
    <section class="summary" id="summary"></section>

    <section class="toolbar">
      <input id="filter" type="search" placeholder="Filter skills">
      <select id="enabled">
        <option value="">All states</option>
        <option value="true">Enabled</option>
        <option value="false">Disabled</option>
      </select>
      <select id="risk">
        <option value="">All risk tiers</option>
        <option value="read_only">Read only</option>
        <option value="local_write">Local write</option>
        <option value="approval_gated">Approval gated</option>
      </select>
      <button class="secondary" id="refreshBtn">Refresh</button>
    </section>

    <section class="route-box">
      <div class="route-row">
        <textarea id="routeQuery" rows="2" placeholder="Ask what Zade should route against, for example: build a pricing page and verify it before claiming done"></textarea>
        <select id="taskType">
          <option value="general">general</option>
          <option value="reasoning">reasoning</option>
          <option value="coding">coding</option>
        </select>
        <button id="routeBtn">Route</button>
      </div>
      <pre id="routeOut">No route run yet.</pre>
    </section>

    <div class="notice" id="notice"></div>
    <section class="grid" id="skills"></section>
  </main>

  <script>
    const state = { skills: [], summary: null };
    const token = () => localStorage.getItem('zadeKernelToken') || '';
    const headers = () => token() ? { 'Content-Type': 'application/json', 'X-Zade-Token': token() } : { 'Content-Type': 'application/json' };
    const api = async (path, opts = {}) => {
      const response = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    };
    const byId = (id) => document.getElementById(id);
    const notice = (text) => { byId('notice').textContent = text || ''; };
    const esc = (value) => String(value == null ? '' : value).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));

    async function load() {
      notice('Loading skills.');
      const enabled = byId('enabled').value;
      const risk = byId('risk').value;
      const qs = new URLSearchParams();
      if (enabled) qs.set('enabled', enabled);
      if (risk) qs.set('risk_tier', risk);
      qs.set('limit', '500');
      const data = await api('/skills?' + qs.toString());
      state.skills = data.items || [];
      state.summary = data.summary || {};
      render();
      notice('Loaded ' + state.skills.length + ' skills.');
    }

    function renderSummary() {
      const s = state.summary || {};
      const risk = s.by_risk_tier || {};
      byId('summary').innerHTML = [
        metric(s.total || 0, 'Installed'),
        metric(s.enabled || 0, 'Enabled'),
        metric(risk.approval_gated || 0, 'Approval gated'),
        metric((s.recently_used || []).length, 'Recently used')
      ].join('');
    }

    function metric(value, label) {
      return '<div class="metric"><strong>' + esc(value) + '</strong><span>' + esc(label) + '</span></div>';
    }

    function render() {
      renderSummary();
      const q = byId('filter').value.trim().toLowerCase();
      const filtered = state.skills.filter((skill) => {
        if (!q) return true;
        return [skill.name, skill.description, skill.source, skill.risk_tier].join(' ').toLowerCase().includes(q);
      });
      byId('skills').innerHTML = filtered.map(renderSkill).join('') || '<div class="notice">No skills match.</div>';
      document.querySelectorAll('[data-toggle]').forEach((btn) => {
        btn.addEventListener('click', async () => toggleSkill(btn.dataset.toggle, btn.dataset.enabled !== 'true'));
      });
    }

    function renderSkill(skill) {
      const riskClass = skill.risk_tier || 'read_only';
      return `
        <article class="skill">
          <div class="skill-head">
            <div>
              <h2>${esc(skill.name)}</h2>
              <div class="sub">${esc(skill.source || 'local')}</div>
            </div>
            <span class="pill ${skill.enabled ? 'enabled' : ''}">${skill.enabled ? 'enabled' : 'disabled'}</span>
          </div>
          <div class="desc">${esc(skill.description || 'No description.')}</div>
          <div class="meta">
            <span class="pill ${riskClass}">${esc(skill.risk_tier)}</span>
            ${skill.default_enabled ? '<span class="pill">default pack</span>' : ''}
            <span class="pill">${esc((skill.content_hash || '').slice(0, 10))}</span>
          </div>
          <div class="actions">
            <button data-toggle="${esc(skill.name)}" data-enabled="${skill.enabled}">${skill.enabled ? 'Disable' : 'Enable'}</button>
            <a class="button secondary" href="/skills/${encodeURIComponent(skill.name)}" target="_blank">JSON</a>
          </div>
        </article>
      `;
    }

    async function toggleSkill(name, enabled) {
      notice((enabled ? 'Enabling ' : 'Disabling ') + name + '.');
      await api('/skills/' + encodeURIComponent(name) + '/' + (enabled ? 'enable' : 'disable'), { method: 'POST', body: '{}' });
      await load();
    }

    byId('scanBtn').addEventListener('click', async () => {
      try {
        notice('Scanning installed skill folders.');
        const result = await api('/skills/scan', { method: 'POST', body: '{}' });
        notice('Scan complete: ' + result.scanned + ' scanned, ' + result.created + ' created, ' + result.updated + ' updated.');
        await load();
      } catch (err) {
        notice('Scan failed: ' + err.message);
      }
    });

    byId('refreshBtn').addEventListener('click', () => load().catch((err) => notice('Refresh failed: ' + err.message)));
    byId('filter').addEventListener('input', render);
    byId('enabled').addEventListener('change', () => load().catch((err) => notice('Filter failed: ' + err.message)));
    byId('risk').addEventListener('change', () => load().catch((err) => notice('Filter failed: ' + err.message)));
    byId('routeBtn').addEventListener('click', async () => {
      try {
        const query = byId('routeQuery').value.trim();
        if (!query) return;
        const result = await api('/skills/route', {
          method: 'POST',
          body: JSON.stringify({ query, task_type: byId('taskType').value, limit: 3 })
        });
        byId('routeOut').textContent = JSON.stringify(result, null, 2);
      } catch (err) {
        byId('routeOut').textContent = 'Route failed: ' + err.message;
      }
    });

    load().catch((err) => notice('Load failed: ' + err.message));
  </script>
</body>
</html>
