<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zade — Browser</title>
  <style>
    /* Page-specific layout only; colors/type/components from /ui/zade-ui.css. */
    * { box-sizing: border-box; }
    h1 { margin: 0; font-size: 38px; line-height: 1.05; font-weight: 500; }
    body[data-zade-type="sans"] main { max-width: none; margin: 0; padding: 0; }
    .page { padding: 46px 48px 96px; max-width: 860px; }
    .kicker { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 12px; }

    .status-row { display: flex; gap: 22px; flex-wrap: wrap; margin: 32px 0 28px; }
    .stat { min-width: 120px; }
    .stat-label { font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--z-faint); }
    .stat-value { font-size: 15px; color: var(--z-ink-hi); margin-top: 3px; }

    .section { margin-bottom: 26px; }
    .field-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 10px; }
    .stack input, .stack textarea { width: 100%; margin-bottom: 8px; border-radius: 6px; }
    textarea.steps { font-family: ui-monospace, Consolas, monospace; font-size: 12px; min-height: 200px; resize: vertical; }
    .quick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .quick button { min-height: 26px; padding: 4px 11px; font-size: 11px; }
    .note { font-size: 11.5px; margin-top: 6px; min-height: 14px; }
    .note.good { color: var(--z-ok-text); }
    .note.err { color: var(--z-bad-text); }
    .queued { border-left: 2px solid var(--z-accent-dim, rgba(176,71,63,0.4)); padding: 10px 14px; margin-top: 12px; font-size: 12.5px; color: var(--z-muted); }
    .queued a { color: var(--z-accent-2, #d07d74); }
  </style>
  <link rel="stylesheet" href="zade-ui.css">
</head>
<body data-zade-type="sans">
  <main>
    <div class="page">
      <div class="kicker">Ops · Browser</div>
      <h1>I go look, so you don’t have to.</h1>
      <div class="zade-page-sub">Governed browser flows. Every step is logged, every action gated. I bring back what matters and leave no trace you didn’t authorize.</div>

      <div class="status-row" id="statusRow"><div class="stat"><div class="stat-label">Status</div><div class="stat-value">Loading…</div></div></div>

      <div class="section stack">
        <div class="field-label">Flow title</div>
        <input id="flowTitle" placeholder="What is this flow for? (shows on the approval card)">
        <div class="field-label" style="margin-top:12px;">Steps — JSON array, first step must navigate</div>
        <div class="quick" id="quickAdd">
          <button data-step='{"type":"navigate","url":"https://"}'>+ navigate</button>
          <button data-step='{"type":"read","selector":""}'>+ read</button>
          <button data-step='{"type":"links","selector":""}'>+ links</button>
          <button data-step='{"type":"fill","selector":"","value":""}'>+ fill</button>
          <button data-step='{"type":"click","selector":""}'>+ click</button>
          <button data-step='{"type":"press","selector":"","key":"Enter"}'>+ press</button>
          <button data-step='{"type":"wait","ms":1000}'>+ wait</button>
          <button data-step='{"type":"screenshot"}'>+ screenshot</button>
        </div>
        <textarea id="steps" class="steps" spellcheck="false">[
  { "type": "navigate", "url": "https://" },
  { "type": "read" }
]</textarea>
        <button id="queueBtn">Queue flow for approval</button>
        <div class="note" id="queueNote"></div>
        <div class="queued" id="queuedBox" hidden></div>
      </div>
    </div>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);
    const token = () => localStorage.getItem('zadeKernelToken') || '';
    (async () => { if (token()) return; try { const r = await fetch('/session/token'); if (r.ok) { const d = await r.json(); if (d.token) localStorage.setItem('zadeKernelToken', d.token); } } catch (e) {} })();
    const headers = () => token() ? { 'Content-Type': 'application/json', 'X-Zade-Token': token() } : { 'Content-Type': 'application/json' };
    const esc = (v) => String(v == null ? '' : v).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const api = async (path, opts = {}) => {
      const response = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    };
    async function withBusy(btn, label, fn) {
      const original = btn.textContent; btn.disabled = true; btn.textContent = label;
      try { return await fn(); } finally { btn.disabled = false; btn.textContent = original; }
    }

    async function loadStatus() {
      const row = byId('statusRow');
      try {
        const s = await api('/browser/status');
        row.innerHTML = [
          ['Enabled', s.enabled ? 'Yes' : 'No'],
          ['Playwright', s.playwright_available ? 'Installed' : 'Missing — run: python -m playwright install chromium'],
          ['Mode', s.headless ? 'Headless' : 'Headed'],
          ['Engine', s.browser || '—'],
          ['Max steps', s.max_steps],
        ].map(([label, value]) => `<div class="stat"><div class="stat-label">${esc(label)}</div><div class="stat-value">${esc(value)}</div></div>`).join('');
      } catch (err) {
        row.innerHTML = `<div class="stat"><div class="stat-label">Status</div><div class="stat-value">Unavailable — ${esc(err.message)}</div></div>`;
      }
    }

    byId('quickAdd').addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-step]');
      if (!btn) return;
      const area = byId('steps');
      let list;
      try { list = JSON.parse(area.value); if (!Array.isArray(list)) throw new Error(); } catch { list = []; }
      list.push(JSON.parse(btn.dataset.step));
      area.value = JSON.stringify(list, null, 2);
    });

    async function queueFlow() {
      const note = byId('queueNote'); note.textContent = ''; note.className = 'note';
      const box = byId('queuedBox'); box.hidden = true;
      let steps;
      try {
        steps = JSON.parse(byId('steps').value);
        if (!Array.isArray(steps) || !steps.length) throw new Error('Steps must be a non-empty array.');
      } catch (err) { note.textContent = 'Invalid steps JSON: ' + err.message; note.className = 'note err'; return; }
      try {
        const result = await api('/browser/run', { method: 'POST', body: JSON.stringify({ steps, title: byId('flowTitle').value.trim() }) });
        note.textContent = 'Queued.'; note.className = 'note good';
        box.hidden = false;
        box.innerHTML = `Work item <strong>#${esc(result.work_item_id ?? result.id ?? '?')}</strong> is waiting for you in ` +
          `<a href="approvals.html">Approvals</a> — approve it, then dispatch with the typed phrase. ` +
          `<div style="margin-top:6px;">${esc(result.note || '')}</div>`;
      } catch (err) { note.textContent = 'Queue failed: ' + err.message; note.className = 'note err'; }
    }
    byId('queueBtn').addEventListener('click', () => withBusy(byId('queueBtn'), 'Queuing…', queueFlow));

    loadStatus();
  </script>
  <script src="zade-ui.js"></script>
</body>
</html>
