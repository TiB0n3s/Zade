  <script>
  (function () {
    // Voice wiring for the Command dashboard's Conversation tab.
    //
    // The Conversation UI (ZadeChat) is a separately compiled component this
    // file doesn't control the internals of, so voice is wired at the DOM /
    // network boundary instead of inside it: mic input drives the real
    // chat-input + chat-send elements (so replies land in the visible thread
    // through the real /runtime/respond pipeline, not a parallel one), and
    // replies are captured by intercepting the fetch call the chat component
    // already makes, rather than scraping rendered message-bubble markup.
    //
    // The widget is appended to document.body and re-attached on every poll
    // tick if missing, because the bundler's unpack step replaces
    // document.documentElement wholesale after this script has already run.

    function voiceToken() {
      return (typeof localStorage !== 'undefined' && localStorage.getItem('zadeKernelToken')) || '';
    }
    (function bootstrapToken() {
      if (localStorage.getItem('zadeKernelToken')) return;
      fetch('/session/token').then(function (r) { return r.ok ? r.json() : null; })
        .then(function (d) { if (d && d.token) localStorage.setItem('zadeKernelToken', d.token); })
        .catch(function () {});
    })();
    function voiceHeaders() {
      var t = voiceToken();
      return t ? { 'Content-Type': 'application/json', 'X-Zade-Token': t } : { 'Content-Type': 'application/json' };
    }
    function autoSpeakOn() {
      return localStorage.getItem('zadeVoiceAutoSpeak') !== 'off';
    }

    // Intercept /runtime/respond so a reply can be spoken once it's known,
    // instead of scraping the (unstable, unlabeled) rendered message DOM.
    var origFetch = window.fetch;
    window.fetch = function (input, init) {
      var url = typeof input === 'string' ? input : (input && input.url) || '';
      // Native fetch requires its receiver to literally be `window` -- code
      // that calls bare fetch(...) (not window.fetch(...)) hits this wrapper
      // with `this` unbound (strict-mode module code), and .apply(this, ...)
      // would throw "Illegal invocation" on the real implementation.
      var result = origFetch.apply(window, arguments);
      if (url.indexOf('/runtime/respond') !== -1 && init && init.method === 'POST') {
        result.then(function (resp) {
          if (!resp.ok) return;
          resp.clone().json().then(function (body) {
            if (autoSpeakOn() && body && body.response) speakReply(body.response);
          }).catch(function () {});
        });
      }
      return result;
    };

    function speakReply(text) {
      fetch('/voice/speak', { method: 'POST', headers: voiceHeaders(), body: JSON.stringify({ text: text }) })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (data) {
          if (!data) return;
          var audio = new Audio('data:audio/' + (data.format || 'mpeg') + ';base64,' + data.audio_base64);
          audio.play().catch(function () {});
        }).catch(function () {});
    }

    var state = { recording: false, recorder: null, chunks: [], listening: false };
    var els = null;

    function setStatus(s) {
      if (!els) return;
      els.mic.style.background = s === 'recording' ? '#b0473f' : 'rgba(176,71,63,0.12)';
      els.mic.style.borderColor = s === 'recording' ? '#d07d74' : 'rgba(176,71,63,0.5)';
      els.label.textContent = s === 'recording' ? 'Listening… tap to stop'
        : s === 'transcribing' ? 'Transcribing…'
        : s === 'error' ? 'Voice error' : 'Tap to speak';
    }

    // Voice-activity detection: tap once to start, and recording auto-stops
    // and sends itself once you stop talking -- no second tap needed. A
    // manual tap while recording still stops it immediately as a fallback.
    var VAD_SILENCE_MS = 1100;
    var VAD_MIN_RECORD_MS = 400;
    var VAD_MAX_RECORD_MS = 30000;
    var VAD_RMS_THRESHOLD = 0.02;

    function watchForSilence(stream) {
      var AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return; // no VAD support: manual tap-to-stop still works
      var ctx = new AudioCtx();
      var source = ctx.createMediaStreamSource(stream);
      var analyser = ctx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);
      var data = new Uint8Array(analyser.fftSize);
      var startedAt = Date.now();
      var speechDetected = false;
      var silenceStart = null;

      function tick() {
        if (!state.listening) { ctx.close(); return; }
        analyser.getByteTimeDomainData(data);
        var sumSquares = 0;
        for (var i = 0; i < data.length; i++) {
          var v = (data[i] - 128) / 128;
          sumSquares += v * v;
        }
        var rms = Math.sqrt(sumSquares / data.length);
        var now = Date.now();
        if (rms > VAD_RMS_THRESHOLD) {
          speechDetected = true;
          silenceStart = null;
        } else if (speechDetected && silenceStart === null) {
          silenceStart = now;
        }
        var elapsed = now - startedAt;
        var silentFor = silenceStart ? now - silenceStart : 0;
        if (elapsed > VAD_MAX_RECORD_MS || (speechDetected && silentFor > VAD_SILENCE_MS && elapsed > VAD_MIN_RECORD_MS)) {
          ctx.close();
          stopMic();
          return;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    function toggleMic() {
      if (state.recording) { stopMic(); return; }
      if (!navigator.mediaDevices || !window.MediaRecorder) { setStatus('error'); return; }
      navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
        state.chunks = [];
        var rec = new MediaRecorder(stream);
        rec.ondataavailable = function (e) { if (e.data && e.data.size) state.chunks.push(e.data); };
        rec.onstop = function () { stream.getTracks().forEach(function (t) { t.stop(); }); sendVoice(rec.mimeType); };
        rec.start();
        state.recorder = rec;
        state.recording = true;
        state.listening = true;
        setStatus('recording');
        watchForSilence(stream);
      }).catch(function () { setStatus('error'); });
    }

    function stopMic() {
      if (state.recorder && state.recording) {
        state.recording = false;
        state.listening = false;
        setStatus('transcribing');
        state.recorder.stop();
      }
    }

    function sendVoice(mimeType) {
      var blob = new Blob(state.chunks, { type: mimeType || 'audio/webm' });
      if (!blob.size) { setStatus('idle'); return; }
      var reader = new FileReader();
      reader.onloadend = function () {
        var audio_base64 = String(reader.result).split(',')[1] || '';
        fetch('/voice/transcribe', {
          method: 'POST', headers: voiceHeaders(),
          body: JSON.stringify({ audio_base64: audio_base64, audio_mime: blob.type || mimeType || 'audio/webm' })
        }).then(function (r) { if (!r.ok) throw new Error('transcribe failed'); return r.json(); })
          .then(function (data) {
            setStatus('idle');
            if (data.text) fillAndSend(data.text);
          }).catch(function () { setStatus('error'); });

    }

    function fillAndSend(text) {
      var input = document.querySelector('[data-testid="chat-input"]');
      var send = document.querySelector('[data-testid="chat-send"]');
      if (!input || !send) return;

      setter.call(input, text);
      input.dispatchEvent(new Event('input', { bubbles: true }));
      send.click();
    }

    function buildWidget() {
      var wrap = document.createElement('div');
      wrap.id = 'zade-voice-overlay';
      wrap.style.cssText = 'position:fixed;right:28px;bottom:96px;z-index:99997;display:none;align-items:center;gap:10px;' +
        'background:rgba(12,12,14,0.92);border:1px solid rgba(255,255,255,0.08);border-radius:24px;' +
        'padding:8px 16px 8px 8px;box-shadow:0 4px 18px rgba(0,0,0,0.35);backdrop-filter:blur(10px);' +
        'font:13px/1.4 Inter, ui-sans-serif, system-ui, sans-serif;';

      var mic = document.createElement('div');
      mic.textContent = '🎙';
      mic.style.cssText = 'display:flex;align-items:center;justify-content:center;width:40px;height:40px;' +
        'border-radius:50%;cursor:pointer;border:1px solid rgba(176,71,63,0.5);background:rgba(176,71,63,0.12);' +
        'color:#f0eee9;font-size:16px;flex:0 0 auto;transition:background 0.2s,border-color 0.2s;';
      mic.title = 'Tap to speak to Zade';
      mic.addEventListener('click', toggleMic);

      var label = document.createElement('span');
      label.textContent = 'Tap to speak';
      label.style.cssText = 'font-size:11.5px;color:#8a8a91;min-width:118px;';

      var speaker = document.createElement('div');
      speaker.textContent = autoSpeakOn() ? '🔊' : '🔇';
      speaker.title = 'Toggle auto-speak replies';
      speaker.style.cssText = 'cursor:pointer;font-size:15px;padding:4px;';
      speaker.addEventListener('click', function () {
        var on = autoSpeakOn();
        localStorage.setItem('zadeVoiceAutoSpeak', on ? 'off' : 'on');
        speaker.textContent = on ? '🔇' : '🔊';
      });

      wrap.appendChild(mic);
      wrap.appendChild(label);
      wrap.appendChild(speaker);
      document.body.appendChild(wrap);
      els = { wrap: wrap, mic: mic, label: label, speaker: speaker };
    }

    setInterval(function () {
      if (!document.body) return;
      if (!els || !document.body.contains(els.wrap)) buildWidget();
      var onConversation = !!document.querySelector('[data-testid="chat-input"]');
      els.wrap.style.display = onConversation ? 'flex' : 'none';
    }, 400);
  })();

 fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M9 3h6\"><\u002Fpath><path d=\"M10 3v6.3L4.9 18a2 2 0 0 0 1.8 3h10.6a2 2 0 0 0 1.8-3L14 9.3V3\"><\u002Fpath><path d=\"M7.5 14h9\"><\u002Fpath><\u002Fsvg>\n        <span>Experiments<\u002Fspan>\n      <\u002Fdiv>\n      <div data-testid=\"nav-predictions\" sc-camel-on-click=\"{{ goPredictions }}\" style=\"{{ navStylePredictions }}\">\n        <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 17l6-6 4 4 8-8\"><\u002Fpath><path d=\"M17 7h4v4\"><\u002Fpath><\u002Fsvg>\n        <span>Predictions<\u002Fspan>\n      <\u002Fdiv>\n      <div data-testid=\"nav-memory\" sc-camel-on-click=\"{{ goMemory }}\" style=\"{{ navStyleMemory }}\">\n        <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><ellipse cx=\"12\" cy=\"5\" rx=\"9\" ry=\"3\"><\u002Fellipse><path d=\"M3 5v14a9 3 0 0 0 18 0V5\"><\u002Fpath><path d=\"M3 12a9 3 0 0 0 18 0\"><\u002Fpath><\u002Fsvg>\n        <span>Memory<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:9px;padding:14px 10px 0;border-top:1px solid rgba(255,255,255,0.05);\">\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <div style=\"width:6px;height:6px;border-radius:50%;background:#5a8a72;animation:strategist-pulse 3s ease-in-out infinite;flex:none;\"><\u002Fdiv>\n        <div style=\"font-size:10.5px;letter-spacing:0.05em;color:#5e5e64;\">{{ connectionLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;\">\n        <div style=\"width:6px;height:6px;border-radius:50%;background:#46464b;flex:none;\"><\u002Fdiv>\n        <div style=\"font-size:10.5px;letter-spacing:0.05em;color:#5e5e64;\">Ollama \u00b7 4 model roles<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <main style=\"position:relative;z-index:2;flex:1;height:100%;overflow-y:auto;\">\n\n    <sc-if value=\"{{ screenIsCommand }}\" hint-placeholder-val=\"{{ true }}\">\n      <dc-import name=\"ZadeCommand\" hint-size=\"100%,100%\" brief=\"{{ brief }}\" dashboard=\"{{ dashboard }}\" go-conversation=\"{{ goConversation }}\" go-queue=\"{{ goQueue }}\" go-evidence=\"{{ goEvidence }}\">\n      <\u002Fdc-import>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ screenIsConversation }}\" hint-placeholder-val=\"{{ false }}\">\n      <dc-import name=\"ZadeChat\" hint-size=\"100%,100%\" messages=\"{{ messages }}\" query=\"{{ query }}\" set-query=\"{{ setQuery }}\" send=\"{{ send }}\" thinking=\"{{ thinking }}\" thinking-step=\"{{ thinkingStepIndex }}\" reasoning-steps=\"{{ thinkingSteps }}\" quick-prompts=\"{{ quickPrompts }}\" send-quick=\"{{ sendQuick }}\" layer-state=\"{{ layerState }}\" toggle-layer=\"{{ toggleLayer }}\">\n      <\u002Fdc-import>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ screenIsQueue }}\" hint-placeholder-val=\"{{ false }}\">\n      <dc-import name=\"ZadeQueue\" hint-size=\"100%,100%\" queue=\"{{ queue }}\" authority=\"{{ authority }}\" expanded-id=\"{{ expandedQueueId }}\" toggle=\"{{ toggleQueueEntry }}\" on-scan=\"{{ doScan }}\" on-run-next=\"{{ doRunNext }}\" on-run-due=\"{{ doRunDue }}\" on-approve=\"{{ doApprove }}\" on-deny=\"{{ doDeny }}\" notice=\"{{ queueNotice }}\" busy=\"{{ actionBusy }}\">\n      <\u002Fdc-import>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ screenIsEvidence }}\" hint-placeholder-val=\"{{ false }}\">\n      <dc-import name=\"ZadeEvidence\" hint-size=\"100%,100%\" evidence=\"{{ evidence }}\" assumptions=\"{{ assumptions }}\" confidence-events=\"{{ confidenceEvents }}\" expanded-id=\"{{ expandedAssumptionId }}\" toggle=\"{{ toggleAssumptionEntry }}\">\n      <\u002Fdc-import>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ screenIsExperiments }}\" hint-placeholder-val=\"{{ false }}\">\n      <dc-import name=\"ZadeExperiments\" hint-size=\"100%,100%\" experiments=\"{{ experiments }}\" kill-criteria=\"{{ killCriteria }}\" expanded-id=\"{{ expandedExperimentId }}\" toggle=\"{{ toggleExperimentEntry }}\" on-add-evidence=\"{{ doAddEvidence }}\" on-review=\"{{ doReview }}\" on-pushback=\"{{ doPushback }}\" on-create-experiment=\"{{ doCreateExperiment }}\" notice=\"{{ experimentsNotice }}\" busy=\"{{ actionBusy }}\">\n      <\u002Fdc-import>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ screenIsPredictions }}\" hint-placeholder-val=\"{{ false }}\">\n      <dc-import name=\"ZadePredictions\" hint-size=\"100%,100%\" predictions=\"{{ predictions }}\"><\u002Fdc-import>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ screenIsMemory }}\" hint-placeholder-val=\"{{ false }}\">\n      <dc-import name=\"ZadeMemory\" hint-size=\"100%,100%\" memory=\"{{ memory }}\"><\u002Fdc-import>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text\u002Fx-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    activeScreen: 'command',\n    data: {},\n    query: '',\n    messages: [],\n    thinking: false,\n    thinkingStepIndex: -1,\n    layerState: {},\n    expandedQueueId: null,\n    expandedAssumptionId: null,\n    expandedExperimentId: null,\n    queueNotice: '',\n    experimentsNotice: '',\n    actionBusy: false\n  };\n\n  async componentDidMount() {\n    const mod = await import((window.__resources && window.__resources.zadeData) || '.\u002Fzade-data.js');\n    this._mod = mod;\n    this._client = mod.ZadeClient;\n    await this.loadAll();\n  }\n\n  async loadAll() {\n    const c = this._client;\n    const [brief, dashboard, queue, authority, assumptions, evidence, confidenceEvents, experiments, killCriteria, predictions, memory] = await Promise.all([\n      c.brief(), c.dashboard(), c.workQueue(), c.authority(), c.assumptions(), c.evidence(),\n      c.confidenceEvents(), c.experiments(), c.killCriteria(), c.predictions(), c.memory()\n    ]);\n    if (dashboard && !dashboard.stats) {\n      dashboard.stats = {\n        assumptions: (assumptions.items || []).length,\n        evidence: (evidence || []).length,\n        open_conflicts: (dashboard.integrity_warnings || []).length,\n        predictions_open: (predictions.items || []).filter((p) => p.status === 'open').length\n      };\n    }\n    this.setState({ data: { brief, dashboard, queue, authority, assumptions, evidence, confidenceEvents, experiments, killCriteria, predictions, memory } });\n  }\n\n  refreshQueue = async () => {\n    const queue = await this._client.workQueue();\n    this.setState((s) => ({ data: { ...s.data, queue } }));\n  };\n\n  refreshExperiments = async () => {\n    const experiments = await this._client.experiments();\n    this.setState((s) => ({ data: { ...s.data, experiments } }));\n  };\n\n  goCommand = () => this.setState({ activeScreen: 'command' });\n  goConversation = () => this.setState({ activeScreen: 'conversation' });\n  goQueue = () => this.setState({ activeScreen: 'queue' });\n  goEvidence = () => this.setState({ activeScreen: 'evidence' });\n  goExperiments = () => this.setState({ activeScreen: 'experiments' });\n  goPredictions = () => this.setState({ activeScreen: 'predictions' });\n  goMemory = () => this.setState({ activeScreen: 'memory' });\n\n  setQuery = (v) => this.setState({ query: v });\n\n  toggleLayer = (msgId, key) => {\n    this.setState((s) => {\n      const cur = s.layerState[msgId] || { reasoning: false, context: false, pushback: false, recommendations: true };\n      return { layerState: { ...s.layerState, [msgId]: { ...cur, [key]: !cur[key] } } };\n    });\n  };\n\n  toggleQueueEntry = (id) => this.setState((s) => ({ expandedQueueId: s.expandedQueueId === id ? null : id }));\n  toggleAssumptionEntry = (id) => this.setState((s) => ({ expandedAssumptionId: s.expandedAssumptionId === id ? null : id }));\n  toggleExperimentEntry = (id) => this.setState((s) => ({ expandedExperimentId: s.expandedExperimentId === id ? null : id }));\n\n  \u002F\u002F \u2500\u2500 Work queue actions \u2192 POST \u002Fwork\u002Fscan, \u002Fwork\u002Frun-next, \u002Fwork\u002Frun-due \u2500\u2500\n\n  runQueueAction = async (fn, label) => {\n    if (this.state.actionBusy || !this._client) return;\n    this.setState({ actionBusy: true, queueNotice: label + '\u2026' });\n    try {\n      const r = await fn();\n      await this.refreshQueue();\n      let notice = label + ' \u2014 done';\n      if (r) {\n        if (r.request && r.request.status === 'approved') notice = 'Approval recorded \u2014 external dispatch still requires a registered handler';\n        else if (r.request && r.request.status === 'denied') notice = 'Denied \u2014 item closed';\n        else if (Array.isArray(r.results)) notice = label + ' \u2014 ' + r.results.length + ' item(s) processed';\n        else if (r.local_only) notice = 'Approval recorded locally';\n        else if (r.ran != null) notice = label + ' \u2014 ' + r.ran + ' item(s) ran';\n        else if (r.status === 'empty') notice = label + ' \u2014 nothing pending';\n        else if (r.item) notice = label + ' \u2014 ' + r.item;\n      }\n      this.setState({ queueNotice: notice, actionBusy: false });\n    } catch (e) {\n      this.setState({ queueNotice: 'Failed \u2014 ' + e.message, actionBusy: false });\n    }\n  };\n\n  doScan = () => this.runQueueAction(() => this._client.workScan(), 'Scan');\n  doRunNext = () => this.runQueueAction(() => this._client.workRunNext(), 'Run next');\n  doRunDue = () => this.runQueueAction(() => this._client.workRunDue(), 'Run due');\n  doApprove = (id) => this.runQueueAction(() => this._client.approveWorkItem(id), 'Approve');\n  doDeny = (id) => this.runQueueAction(() => this._client.denyWorkItem(id), 'Deny');\n\n  \u002F\u002F \u2500\u2500 Experiment actions \u2192 POST \u002Fexperiments\u002F{id}\u002Fevidence, \u002Freview, \u002Fpushback \u2500\u2500\n\n  runExperimentAction = async (fn, label) => {\n    if (this.state.actionBusy || !this._client) return;\n    this.setState({ actionBusy: true, experimentsNotice: label + '\u2026' });\n    try {\n      await fn();\n      await this.refreshExperiments();\n      this.setState({ experimentsNotice: label, actionBusy: false });\n    } catch (e) {\n      this.setState({ experimentsNotice: 'Failed \u2014 ' + e.message, actionBusy: false });\n    }\n  };\n\n  doCreateExperiment = (payload) => this.runExperimentAction(() => this._client.createExperiment(payload), 'Experiment created \u2014 ' + payload.title);\n  doAddEvidence = (id, content) => this.runExperimentAction(() => this._client.addExperimentEvidence(id, content), 'Evidence logged to experiment #' + id);\n  doReview = (id, decision) => this.runExperimentAction(() => this._client.reviewExperiment(id, decision), 'Review recorded \u2014 ' + decision);\n  doPushback = (id, objection) => this.runExperimentAction(() => this._client.logPushback(id, objection), 'Pushback logged');\n\n  \u002F\u002F \u2500\u2500 Chat \u2192 POST \u002Fruntime\u002Frespond \u2500\u2500\n\n  runThinking = (text) => {\n    this._pending = this._client.respond(text).catch((e) => ({\n      summary: 'The kernel did not answer \u2014 ' + e.message,\n      model: 'runtime \u00b7 error',\n      authority: { action: 'runtime.respond', tier: 'L0_READ', decision: 'error', note: '' },\n      context: [], reasoning: [], pushback: null, recommendations: [], confidence: null\n    }));\n    const steps = this._mod ? this._mod.THINKING_STEPS : [];\n    this.setState({ thinking: true, thinkingStepIndex: 0 });\n    let step = 0;\n    const advance = () => {\n      step += 1;\n      if (step < steps.length) {\n        this.setState({ thinkingStepIndex: step });\n        this._timer = setTimeout(advance, 450);\n      } else {\n        this._timer = setTimeout(() => this.finishThinking(), 520);\n      }\n    };\n    this._timer = setTimeout(advance, 450);\n  };\n\n  finishThinking = async () => {\n    const resp = await this._pending;\n    const msgId = 'a' + Date.now();\n    this.setState((s) => ({\n      thinking: false,\n      thinkingStepIndex: -1,\n      messages: [...s.messages, { id: msgId, role: 'assistant', ...resp }],\n      layerState: {\n        ...s.layerState,\n        [msgId]: { reasoning: false, context: false, pushback: !!resp.pushback, recommendations: (resp.recommendations || []).length > 0 }\n      }\n    }));\n  };\n\n  send = () => {\n    const text = this.state.query.trim();\n    if (!text || this.state.thinking || !this._client) return;\n    this.setState((s) => ({ messages: [...s.messages, { id: 'u' + Date.now(), role: 'user', text }], query: '' }));\n    this.runThinking(text);\n  };\n\n  sendQuick = (text) => {\n    if (this.state.thinking || !this._client) return;\n    this.setState((s) => ({ messages: [...s.messages, { id: 'u' + Date.now(), role: 'user', text }] }));\n    this.runThinking(text);\n  };\n\n  componentWillUnmount() {\n    if (this._timer) clearTimeout(this._timer);\n  }\n\n  navStyle(isActive) {\n    return {\n      display: 'flex', alignItems: 'center', gap: '11px', padding: '10px 12px', borderRadius: '3px',\n      cursor: 'pointer', fontSize: '13px', letterSpacing: '0.01em',\n      color: isActive ? '#f0eee9' : '#84848a',\n      background: isActive ? 'rgba(176,71,63,0.10)' : 'transparent',\n      borderLeft: isActive ? '2px solid #b0473f' : '2px solid transparent',\n      transition: 'background 0.25s ease, color 0.25s ease'\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const d = s.data;\n    const live = this._client && this._client.baseUrl;\n    return {\n      brief: d.brief,\n      dashboard: d.dashboard,\n      queue: d.queue,\n      authority: d.authority,\n      assumptions: d.assumptions,\n      evidence: d.evidence,\n      confidenceEvents: d.confidenceEvents,\n      experiments: d.experiments,\n      killCriteria: d.killCriteria,\n      predictions: d.predictions,\n      memory: d.memory,\n\n      connectionLabel: live ? 'Live \u00b7 ' + this._client.baseUrl.replace('http:\u002F\u002F', '') : 'Local only \u00b7 mock data',\n      quickPrompts: this._mod ? this._mod.QUICK_PROMPTS : [],\n      thinkingSteps: this._mod ? this._mod.THINKING_STEPS : [],\n\n      screenIsCommand: s.activeScreen === 'command',\n      screenIsConversation: s.activeScreen === 'conversation',\n      screenIsQueue: s.activeScreen === 'queue',\n      screenIsEvidence: s.activeScreen === 'evidence',\n      screenIsExperiments: s.activeScreen === 'experiments',\n      screenIsPredictions: s.activeScreen === 'predictions',\n      screenIsMemory: s.activeScreen === 'memory',\n\n      navStyleCommand: this.navStyle(s.activeScreen === 'command'),\n      navStyleConversation: this.navStyle(s.activeScreen === 'conversation'),\n      navStyleQueue: this.navStyle(s.activeScreen === 'queue'),\n      navStyleEvidence: this.navStyle(s.activeScreen === 'evidence'),\n      navStyleExperiments: this.navStyle(s.activeScreen === 'experiments'),\n      navStylePredictions: this.navStyle(s.activeScreen === 'predictions'),\n      navStyleMemory: this.navStyle(s.activeScreen === 'memory'),\n\n      goCommand: this.goCommand,\n      goConversation: this.goConversation,\n      goQueue: this.goQueue,\n      goEvidence: this.goEvidence,\n      goExperiments: this.goExperiments,\n      goPredictions: this.goPredictions,\n      goMemory: this.goMemory,\n\n      messages: s.messages,\n      query: s.query,\n      setQuery: this.setQuery,\n      send: this.send,\n      sendQuick: this.sendQuick,\n      thinking: s.thinking,\n      thinkingStepIndex: s.thinkingStepIndex,\n      layerState: s.layerState,\n      toggleLayer: this.toggleLayer,\n\n      expandedQueueId: s.expandedQueueId,\n      toggleQueueEntry: this.toggleQueueEntry,\n      expandedAssumptionId: s.expandedAssumptionId,\n      toggleAssumptionEntry: this.toggleAssumptionEntry,\n      expandedExperimentId: s.expandedExperimentId,\n      toggleExperimentEntry: this.toggleExperimentEntry,\n\n      queueNotice: s.queueNotice,\n      experimentsNotice: s.experimentsNotice,\n      actionBusy: s.actionBusy,\n      doScan: this.doScan,\n      doRunNext: this.doRunNext,\n      doRunDue: this.doRunDue,\n      doApprove: this.doApprove,\n      doDeny: this.doDeny,\n      doAddEvidence: this.doAddEvidence,\n      doReview: this.doReview,\n      doPushback: this.doPushback,\n      doCreateExperiment: this.doCreateExperiment\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
