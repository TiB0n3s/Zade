<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zade — Home</title>
  <style>
    /* Page-specific layout only. Colors, type, and base components come from
       the shared /ui/zade-ui.css, which loads after this block and wins on the
       body-prefixed cascade. Home is the daily surface: a time-aware greeting
       in Zade's voice, the conversation on the left, the needs-you rail right. */
    * { box-sizing: border-box; }
    h1 { margin: 0; }

    body.page-home main { max-width: none; margin: 0; padding: 0; }
    .page { padding: 46px 48px 72px; }
    .kicker { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 14px; }

    body.page-home h1 { font-size: 44px; line-height: 1.05; font-weight: 500; }
    .greet-sub { font-family: var(--z-serif); font-style: italic; font-size: 19px; line-height: 1.45; color: #cfccc6; margin-top: 12px; max-width: 60ch; }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 40px;
      align-items: start;
      margin-top: 38px;
    }

    /* --- Left: conversation --- */
    .conv { min-width: 0; }
    .composer { display: flex; gap: 10px; align-items: center; max-width: 680px; }
    .mic {
      width: 42px; height: 42px; flex: none; border-radius: 50%;
      border: 1px solid var(--z-accent-dim); background: transparent; color: var(--z-accent-2);
      display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; min-height: 0;
      transition: border-color .2s, background .2s, color .2s;
    }
    .mic.active { border-color: var(--z-accent-2); background: rgba(176,71,63,0.18); color: var(--z-text); }
    .composer input.chatbox {
      flex: 1; background: var(--z-well); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      padding: 13px 15px; color: var(--z-ink-hi); font-family: var(--z-sans); font-size: 14px;
    }
    .composer button.send { border-radius: 8px; padding: 12px 20px; min-height: 0; }
    .composer-error { color: var(--z-bad-text); font-size: 11.5px; max-width: 680px; margin-top: 8px; min-height: 14px; }

    .thread {
      display: flex; flex-direction: column; gap: 24px; max-width: 680px;
      margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--z-line);
    }
    .msg-row { display: flex; }
    .msg-row.founder { justify-content: flex-end; }
    .founder-msg { max-width: 520px; font-size: 14.5px; line-height: 1.55; color: var(--z-ink-hi); text-align: right; }
    .zade-msg { max-width: 600px; }
    .zade-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--z-accent-2); margin-bottom: 7px; }
    .zade-text { font-family: var(--z-serif); font-style: italic; font-size: 19px; line-height: 1.5; color: var(--z-text); white-space: pre-wrap; }
    .contrarian { margin-top: 12px; padding: 10px 15px; border-left: 2px solid var(--z-accent-dim); }
    .contrarian-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 4px; }
    .contrarian-text { font-size: 13px; color: var(--z-muted); line-height: 1.55; }
    .thinking { font-family: var(--z-serif); font-style: italic; font-size: 15px; color: var(--z-faint); }
    .thread-empty { font-family: var(--z-serif); font-style: italic; font-size: 17px; color: var(--z-faint); line-height: 1.5; }

    /* --- Live step trace (while Zade works) + persistent per-message summary --- */
    .zade-trace { border-left: 2px solid var(--z-accent-dim); padding: 6px 0 6px 16px; display: flex; flex-direction: column; gap: 9px; }
    .zade-trace .trace-head { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--z-accent-2); }
    .trace-step { display: flex; align-items: baseline; gap: 10px; }
    .trace-mark { width: 7px; height: 7px; border-radius: 50%; flex: none; position: relative; top: 1px; background: var(--z-ghost); }
    .trace-step.pending .trace-mark { background: transparent; box-shadow: inset 0 0 0 1px var(--z-ghost); }
    .trace-step.done .trace-mark { background: var(--z-ok); }
    .trace-step.active .trace-mark { background: var(--z-accent-2); box-shadow: 0 0 0 0 rgba(208, 125, 116, 0.5); animation: trace-pulse 1.4s ease-out infinite; }
    @keyframes trace-pulse {
      0% { box-shadow: 0 0 0 0 rgba(208, 125, 116, 0.5); }
      70% { box-shadow: 0 0 0 6px rgba(208, 125, 116, 0); }
      100% { box-shadow: 0 0 0 0 rgba(208, 125, 116, 0); }
    }
    .trace-label { font-size: 12.5px; color: var(--z-ink); }
    .trace-step.pending .trace-label { color: var(--z-faint); }
    .trace-step.active .trace-label { color: var(--z-ink-hi); }
    .trace-detail { font-size: 11px; color: var(--z-faint); }

    .trace-summary { margin-top: 13px; }
    .trace-summary > summary { cursor: pointer; list-style: none; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--z-faint); }
    .trace-summary > summary::-webkit-details-marker { display: none; }
    .trace-summary > summary:hover { color: var(--z-ink-hi); }
    .trace-summary .trace-steps { margin-top: 11px; display: flex; flex-direction: column; gap: 7px; }
    .trace-summary .trace-step.ok .trace-mark { background: var(--z-ok); }
    .trace-summary .trace-step.muted .trace-mark { background: transparent; box-shadow: inset 0 0 0 1px var(--z-ghost); }
    .trace-summary .trace-step.warn .trace-mark { background: var(--z-warn); }
    .trace-summary .trace-step.muted .trace-label { color: var(--z-faint); }

    /* --- Right: needs-you rail --- */
    .rail { border-left: 1px solid var(--z-line); padding-left: 28px; }
    .rail .kicker { margin-bottom: 6px; }
    .needs-list { display: flex; flex-direction: column; }
    .needs-row { padding: 14px 2px; border-top: 1px solid var(--z-line-soft); }
    .needs-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
    .needs-title { font-size: 13px; color: var(--z-ink-hi); text-decoration: none; }
    .needs-title:hover { color: var(--z-text); }
    .needs-handle {
      flex: none; background: transparent; border: 0; padding: 2px; min-height: 0;
      cursor: pointer; color: var(--z-faint); font-size: 11px;
    }
    .needs-handle:hover { color: var(--z-accent-2); background: transparent; border: 0; }
    .needs-line { font-size: 12px; color: var(--z-muted); margin-top: 4px; }
    .needs-kind { font-size: 11px; color: var(--z-faint); margin-top: 4px; letter-spacing: 0.02em; }
    .rail-empty { font-size: 12.5px; color: var(--z-faint); padding: 13px 2px; border-top: 1px solid var(--z-line-soft); }
    .quiet { padding: 16px 2px 4px; border-top: 1px solid var(--z-line-soft); }
    .quiet-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
    .quiet-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: var(--z-ok); animation: zblink 3.4s ease-in-out infinite; }
    .quiet-label { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--z-ok-text); }
    .quiet-line { font-family: var(--z-serif); font-style: italic; font-size: 17px; color: var(--z-ink); line-height: 1.5; }
    .objective { margin-top: 30px; }
    .objective .kicker { margin-bottom: 10px; }
    .objective-text { font-family: var(--z-serif); font-style: italic; font-size: 17px; color: var(--z-ink-hi); line-height: 1.4; }
    .objective-note { font-size: 11.5px; color: var(--z-faint); margin-top: 7px; }

    /* --- Today strip: the state of the house at a glance --- */
    .today-strip { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 14px; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--z-faint); }
    .today-strip a { color: inherit; text-decoration: none; }
    .today-strip a:hover { color: var(--z-ink-hi); }
    .today-strip .sep { color: var(--z-ghost, rgba(255,255,255,0.12)); }
    .today-strip .hot { color: var(--z-accent-2, #d07d74); }

    /* --- Rail sections: away digest, recent decisions, quick actions --- */
    .rail-section { margin-top: 30px; }
    .rail-section .kicker { margin-bottom: 6px; }
    .away-row, .decision-row { padding: 11px 2px; border-top: 1px solid var(--z-line-soft); display: block; text-decoration: none; }
    .away-title, .decision-title { font-size: 12.5px; color: var(--z-ink-hi); }
    a.away-row:hover .away-title, a.decision-row:hover .decision-title { color: var(--z-text); }
    .away-sub, .decision-sub { font-size: 11px; color: var(--z-faint); margin-top: 3px; }
    .rail-more { font-size: 11px; color: var(--z-faint); text-decoration: none; display: inline-block; margin-top: 8px; }
    .rail-more:hover { color: var(--z-accent-2, #d07d74); }
    .qa-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .qa-row button, .qa-row a { min-height: 26px; padding: 4px 12px; font-size: 11px; border-radius: 999px; border: 1px solid var(--z-line-strong, rgba(255,255,255,0.1)); background: transparent; color: var(--z-muted); text-decoration: none; display: inline-flex; align-items: center; cursor: pointer; }
    .qa-row button:hover, .qa-row a:hover { border-color: var(--z-accent); color: var(--z-text); }
    .qa-note { font-size: 11px; color: var(--z-faint); margin-top: 8px; min-height: 13px; }
    .qa-note.good { color: var(--z-ok-text); }
    .qa-hint { font-size: 11px; color: var(--z-faint); margin-top: 10px; }
    .qa-hint kbd { font-family: var(--z-sans); font-size: 10px; border: 1px solid var(--z-line-strong, rgba(255,255,255,0.1)); border-radius: 4px; padding: 1px 5px; color: var(--z-muted); }

    @media (max-width: 1180px) {
      .home-grid { grid-template-columns: minmax(0, 1fr); }
      .rail { border-left: 0; padding-left: 0; border-top: 1px solid var(--z-line); padding-top: 24px; }
    }
    @media (max-width: 899px) {
      .page { padding: 26px 20px 48px; }
      body.page-home h1 { font-size: 32px; }
    }
  </style>
  <link rel="stylesheet" href="zade-ui.css">
</head>
<body class="page-home">
  <main class="home">
    <div class="page">
      <div class="kicker" id="homeKicker">Home</div>
      <h1 id="greetH1">&nbsp;</h1>
      <div class="greet-sub" id="greetSub"></div>
      <div class="today-strip" id="todayStrip" aria-label="State of the house"></div>

      <div class="home-grid">
        <!-- Conversation -->
        <section class="conv">
          <div class="composer">
            <button type="button" class="mic" id="newThreadBtn" title="Start a new thread (ends the current one)" aria-label="New thread">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            </button>
            <button type="button" class="mic" id="micBtn" title="Hold a voice conversation with Zade" aria-label="Voice">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><path d="M12 19v3"></path></svg>
            </button>
            <input class="chatbox" id="chatInput" placeholder="Say something to Zade…" autocomplete="off">
            <button type="button" class="send" id="sendBtn">Send</button>
          </div>
          <div class="composer-error" id="composerError"></div>
          <div class="thread" id="thread"></div>
        </section>

        <!-- Needs-you rail -->
        <aside class="rail">
          <div class="kicker">Needs you</div>
          <div class="needs-list" id="needsList"><div class="rail-empty">Checking…</div></div>

          <div class="objective">
            <div class="kicker">Current objective</div>
            <div id="objectiveBox"><div class="objective-note" style="margin-top:0;">Loading…</div></div>
          </div>

          <div class="rail-section">
            <div class="kicker">While you were away</div>
            <div id="awayList"><div class="rail-empty">Checking…</div></div>
          </div>

          <div class="rail-section">
            <div class="kicker">Recently decided</div>
            <div id="decisionsList"><div class="rail-empty">Checking…</div></div>
          </div>

          <div class="rail-section">
            <div class="kicker">Set me loose</div>
            <div class="qa-row">
              <button type="button" id="qaDaydream">Daydream</button>
              <a href="research.html">Research</a>
              <a href="browser.html">The browser</a>
              <a href="vault.html">The vault</a>
            </div>
            <div class="qa-note" id="qaNote"></div>
            <div class="qa-hint"><kbd>Ctrl</kbd> <kbd>K</kbd> — anywhere in the house, instantly.</div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);
    const token = () => localStorage.getItem('zadeKernelToken') || '';
    const headers = () => token() ? { 'Content-Type': 'application/json', 'X-Zade-Token': token() } : { 'Content-Type': 'application/json' };
    const esc = (v) => String(v == null ? '' : v).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const api = async (path, opts = {}) => {
      const response = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    };
    // Mutations carry X-Zade-Token; make sure it's fetched before the first send.
    async function ensureToken() {
      if (token()) return;
      try { const r = await fetch('/session/token'); if (r.ok) { const d = await r.json(); if (d.token) localStorage.setItem('zadeKernelToken', d.token); } } catch (e) { /* offline */ }
    }
    const uiBase = () => (location.pathname.startsWith('/ui') ? '/ui/' : '');

    let state = { conversationId: null, messages: [], sending: false, micOn: false, trace: null };
    let traceTimer = null;

    function fmtMs(value, fallback = 'not measured') {
      if (value == null || Number.isNaN(Number(value))) return fallback;
      const n = Math.max(0, Math.round(Number(value)));
      return n >= 1000 ? (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 's' : n + 'ms';
    }

    // ---------- Greeting — time-aware, in his voice ----------
    // "Three things" in the copy deck is the live attention count.
    function countPhrase(n) {
      const words = ['One thing', 'Two things', 'Three things', 'Four things', 'Five things', 'Six things'];
      return n <= 6 ? words[n - 1] : n + ' things';
    }
    function greetingFor(hour, count) {
      const n = Number.isFinite(count) ? count : null;
      if (hour < 12) {
        return {
          h1: 'Good morning, Ellie.',
          sub: 'You slept — good. I didn’t. I went through all of it while the house was dark. '
            + (n === null ? 'A few things are yours to touch.' : n === 0 ? 'Nothing is yours to touch.' : countPhrase(n) + (n === 1 ? ' is' : ' are') + ' yours to touch.')
            + ' The rest I already handled.'
        };
      }
      if (hour < 18) {
        return {
          h1: 'Afternoon, Ellie.',
          sub: 'Nothing’s slipped past me since this morning. '
            + (n === null ? 'A few things want your hand.' : n === 0 ? 'Nothing wants your hand.' : countPhrase(n) + (n === 1 ? ' wants' : ' want') + ' your hand.')
            + ' Everything else, I’ve carried.'
        };
      }
      return {
        h1: 'It’s late, Ellie.',
        sub: 'You should rest. But before you do — '
          + (n === null ? 'a few things are yours, and only yours.' : n === 0 ? 'nothing is waiting on you.' : countPhrase(n).toLowerCase() + (n === 1 ? ' is' : ' are') + ' yours, and only yours.')
          + ' The rest is done. I’ll keep watch.'
      };
    }
    function renderGreeting(count) {
      const g = greetingFor(new Date().getHours(), count);
      byId('greetH1').textContent = g.h1;
      byId('greetSub').textContent = g.sub;
    }

    // Kicker: HOME · {duration} SINCE YOU LEFT — time since the last turn.
    function renderKicker(lastTurnAt) {
      const t = lastTurnAt ? new Date(lastTurnAt).getTime() : NaN;
      if (!t || Number.isNaN(t)) { byId('homeKicker').textContent = 'Home'; return; }
      const mins = Math.max(0, Math.floor((Date.now() - t) / 60000));
      const label = mins >= 48 * 60
        ? Math.round(mins / (24 * 60)) + ' days'
        : String(Math.floor(mins / 60)).padStart(2, '0') + ':' + String(mins % 60).padStart(2, '0');
      byId('homeKicker').textContent = 'Home · ' + label + ' since you left';
    }

    // ---------- Conversation ----------
    function renderThread() {
      const t = byId('thread');
      if (!state.messages.length && !state.sending) {
        t.innerHTML = '<div class="thread-empty">Nothing on the thread yet. Talk to me, Ellie — think out loud, or ask me what’s trying to hurt your business today. I’m already listening.</div>';
        return;
      }
      // Newest-first: the live trace and the latest turn render at the top,
      // right under the composer, so a new reply lands where you type.
      let html = '';
      if (state.sending) html += renderLiveTrace();
      html += [...state.messages].reverse().map(renderMsg).join('');
      t.innerHTML = html;
      t.scrollTop = 0;
    }

    function renderMsg(m) {
      if (m.role === 'assistant') {
        return `
          <div class="msg-row zade">
            <div class="zade-msg">
              <div class="zade-label">Zade</div>
              <div class="zade-text">${esc(m.content)}</div>
              ${m.note ? `<div class="contrarian"><div class="contrarian-label">Contrarian check</div><div class="contrarian-text">${esc(m.note)}</div></div>` : ''}
              ${m.trace ? renderTraceSummary(m.trace) : ''}
            </div>
          </div>`;
      }
      return `<div class="msg-row founder"><div class="founder-msg">${esc(m.content)}</div></div>`;
    }

    // Build the optional "contrarian check" aside from the structured metadata
    // /runtime/respond returns (the critique text itself is already inlined into
    // `response`; this is just the verdict summary).
    function contrarianNote(contrarian) {
      if (!contrarian || contrarian.status === 'error' || !contrarian.verdict) return null;
      const verdict = String(contrarian.verdict).replace(/_/g, ' ');
      const adj = contrarian.confidence_adjustment;
      const adjText = (adj != null && Number(adj) !== 0) ? ` · confidence ${adj > 0 ? '+' : ''}${adj}` : '';
      return `Verdict: ${verdict}${adjText}`;
    }

    // ---------- Live step trace ----------
    // The kernel answers in one synchronous call, so the stages shown while we
    // wait animate through Zade's real pipeline order — they can't stream from
    // the server. The instant the reply lands we swap them for a truthful,
    // persistent summary built entirely from the response payload (never invented).
    const CHAT_STAGES = ['Recalling everything', 'Routing skills', 'Drafting', 'Pushing back on myself'];
    const VOICE_STAGES = ['Transcribing speech', 'Recalling everything', 'Drafting', 'Pushing back on myself'];

    function startTrace(mode) {
      const stages = mode === 'voice' ? VOICE_STAGES : CHAT_STAGES;
      const holdIndex = stages.indexOf('Drafting');
      state.trace = { stages, active: 0, holdIndex };
      renderThread();
      clearInterval(traceTimer);
      // Advance through the fast pre-draft stages, then hold on "Drafting" — the
      // long local-model call — until the real response arrives.
      traceTimer = setInterval(() => {
        if (!state.trace) { clearInterval(traceTimer); return; }
        if (state.trace.active < state.trace.holdIndex) {
          state.trace.active += 1;
          renderThread();
        } else {
          clearInterval(traceTimer);
        }
      }, 640);
    }

    function stopTrace() {
      clearInterval(traceTimer);
      traceTimer = null;
      state.trace = null;
    }

    function renderLiveTrace() {
      const tr = state.trace;
      if (!tr) return '<div class="thinking">Zade is thinking…</div>';
      const rows = tr.stages.map((label, i) => {
        const cls = i < tr.active ? 'done' : (i === tr.active ? 'active' : 'pending');
        return `<div class="trace-step ${cls}"><span class="trace-mark"></span><span class="trace-label">${esc(label)}</span></div>`;
      }).join('');
      return `<div class="zade-trace live" role="status" aria-live="polite"><div class="trace-head">Zade is working</div>${rows}</div>`;
    }

    function renderTraceSummary(steps) {
      if (!steps || !steps.length) return '';
      const rows = steps.map((s) => `
        <div class="trace-step ${s.state || 'ok'}">
          <span class="trace-mark"></span>
          <span class="trace-label">${esc(s.label)}</span>
          ${s.detail ? `<span class="trace-detail">${esc(s.detail)}</span>` : ''}
        </div>`).join('');
      return `<details class="trace-summary"><summary>How I got here · ${steps.length} steps</summary><div class="trace-steps">${rows}</div></details>`;
    }

    // Reconstruct what actually happened this turn from real response fields:
    // governor.evidence_state (present for chat and voice), skill selection
    // (chat only — voice falls back to the match count), applied governor rules,
    // and the contrarian verdict.
    function buildTrace(result, mode) {
      const gov = result.governor || {};
      const ev = gov.evidence_state || (result.context && result.context.evidence_state) || {};
      const rules = gov.applied_rules || [];
      const skillSel = (result.context && result.context.skill_state && result.context.skill_state.selected) || [];
      const timing = result.timing || {};
      const timingSegments = timing.segments_ms || {};
      const milestones = timing.milestones_ms || {};
      const steps = [];

      if (mode === 'voice') {
        const words = String(result.transcript || '').trim().split(/\s+/).filter(Boolean).length;
        const transcriptDetail = words ? words + (words === 1 ? ' word' : ' words') : 'no speech detected';
        steps.push({
          label: 'Transcribed speech',
          detail: transcriptDetail + (timingSegments.transcription != null ? ' · ' + fmtMs(timingSegments.transcription) : ''),
          state: words ? 'ok' : 'muted'
        });
      }

      const mem = Number(ev.memory_hits || 0);
      const sem = Number(ev.semantic_hits || 0);
      steps.push({
        label: 'Recalled memory',
        detail: (mem + sem) ? `${mem} local · ${sem} semantic` : 'nothing relevant on file',
        state: (mem + sem) ? 'ok' : 'muted'
      });

      const skillCount = skillSel.length || Number(ev.skill_matches || 0);
      steps.push({
        label: 'Routed skills',
        detail: skillSel.length ? skillSel.map((s) => s.name).join(', ') : (skillCount ? skillCount + ' matched' : 'none matched'),
        state: skillCount ? 'ok' : 'muted'
      });

      const modelBits = [result.model || ''];
      if (timingSegments.runtime_response != null) modelBits.push(fmtMs(timingSegments.runtime_response));
      if (mode === 'voice' && milestones.model_first_token == null) modelBits.push('first token not available');
      steps.push({ label: 'Drafted reply', detail: modelBits.filter(Boolean).join(' · '), state: 'ok' });

      if (mode === 'voice') {
        if (result.speech_error) {
          steps.push({ label: 'Prepared audio', detail: 'failed after ' + fmtMs(timingSegments.speech_synthesis), state: 'warn' });
        } else {
          steps.push({
            label: 'Prepared audio',
            detail: timingSegments.speech_synthesis != null ? fmtMs(timingSegments.speech_synthesis) : 'skipped',
            state: result.speech ? 'ok' : 'muted'
          });
        }
        steps.push({
          label: 'First sound',
          detail: result.client_playback_started_ms != null ? fmtMs(result.client_playback_started_ms) : 'waiting for audio play',
          state: result.client_playback_started_ms != null ? 'ok' : 'muted'
        });
      }

      const govBits = [];
      if (rules.includes('charter_recitation_repaired')) govBits.push('repaired charter drift');
      if (rules.includes('repetition_loop_trimmed')) govBits.push('trimmed a repetition loop');
      if (rules.includes('episodic_conversation_memory')) govBits.push('kept conversation continuity');
      if (govBits.length) steps.push({ label: 'Governed', detail: govBits.join(' · '), state: 'ok' });

      const c = result.contrarian;
      if (c && c.status === 'ok') {
        const verdict = String(c.verdict || '').replace(/_/g, ' ').trim();
        const adj = c.confidence_adjustment;
        const adjText = (adj != null && Number(adj) !== 0) ? ` · confidence ${adj > 0 ? '+' : ''}${adj}` : '';
        steps.push({ label: 'Contrarian check', detail: (verdict || 'reviewed') + adjText, state: 'ok' });
      } else if (c && c.status === 'error') {
        steps.push({ label: 'Contrarian check', detail: 'pass failed', state: 'warn' });
      } else {
        steps.push({ label: 'Contrarian check', detail: 'not triggered', state: 'muted' });
      }
      return steps;
    }

    async function ensureConversation() {
      if (state.conversationId) return state.conversationId;
      const c = await api('/conversations', { method: 'POST', body: JSON.stringify({ title: '' }) });
      state.conversationId = c.conversation ? c.conversation.id : (c.item ? c.item.id : c.id);
      return state.conversationId;
    }

    // Start a fresh thread: end the current one (final distill + mark ended, so it
    // won't be resumed on next boot) and clear the transcript. The next message
    // opens a new conversation.
    async function newThread() {
      try {
        await ensureToken();
        if (state.conversationId) {
          try { await api('/conversations/' + encodeURIComponent(state.conversationId) + '/end', { method: 'POST' }); } catch (e) {}
        }
      } finally {
        state.conversationId = null;
        state.messages = [];
        renderThread();
        renderGreeting(null);
        renderKicker(null);
      }
    }

    async function sendChat() {
      const text = (byId('chatInput').value || '').trim();
      if (!text || state.sending) return;
      byId('composerError').textContent = '';
      byId('chatInput').value = '';
      state.messages.push({ role: 'founder', content: text });
      state.sending = true;
      startTrace('chat');
      try {
        await ensureToken();
        const conversation_id = await ensureConversation();
        const result = await api('/runtime/respond', {
          method: 'POST',
          body: JSON.stringify({ message: text, conversation_id, use_memory: true, use_semantic_memory: true, use_skills: true })
        });
        state.messages.push({ role: 'assistant', content: result.response || '(no reply)', note: contrarianNote(result.contrarian), trace: buildTrace(result, 'chat') });
      } catch (err) {
        byId('composerError').textContent = 'Zade could not reply: ' + err.message;
      } finally {
        state.sending = false;
        stopTrace();
        renderThread();
        renderKicker(new Date().toISOString());
      }
    }

    // ---------- Voice ----------
    let media = { rec: null, chunks: [], stream: null, startedAtMs: null, stoppedAtMs: null };
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(String(reader.result).split(',')[1] || '');
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }
    async function toggleMic() {
      if (state.micOn) { stopMic(); return; }
      byId('composerError').textContent = '';
      try {
        media.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        byId('composerError').textContent = 'Microphone unavailable: ' + e.message;
        return;
      }
      media.chunks = [];
      media.startedAtMs = performance.now();
      media.stoppedAtMs = null;
      media.rec = new MediaRecorder(media.stream);
      media.rec.ondataavailable = (e) => { if (e.data && e.data.size) media.chunks.push(e.data); };
      media.rec.onstop = () => sendRecording(media.rec.mimeType);
      media.rec.start();
      state.micOn = true;
      byId('micBtn').classList.add('active');
      byId('micBtn').title = 'Stop and send';
    }
    function stopMic() {
      media.stoppedAtMs = performance.now();
      state.micOn = false;
      byId('micBtn').classList.remove('active');
      byId('micBtn').title = 'Hold a voice conversation with Zade';
      if (media.rec && media.rec.state !== 'inactive') media.rec.stop();
      if (media.stream) media.stream.getTracks().forEach((t) => t.stop());
    }
    async function sendRecording(mimeType) {
      const blob = new Blob(media.chunks, { type: mimeType || 'audio/webm' });
      if (!blob.size) return;
      state.sending = true; startTrace('voice');
      try {
        await ensureToken();
        const conversation_id = await ensureConversation();
        const audio_base64 = await blobToBase64(blob);
        const clientTiming = {
          recording_started_at_ms: media.startedAtMs,
          speech_stopped_at_ms: media.stoppedAtMs,
          recording_stopped_at_ms: media.stoppedAtMs,
          request_started_at_ms: performance.now()
        };
        const result = await api('/voice/converse', {
          method: 'POST',
          body: JSON.stringify({ audio_base64, audio_mime: blob.type || 'audio/webm', conversation_id, use_semantic_memory: true, speak_response: true, speak_full: false, client_timing: clientTiming })
        });
        clientTiming.response_received_at_ms = performance.now();
        state.messages.push({ role: 'founder', content: result.transcript || '(no speech detected)' });
        const assistantMessage = { role: 'assistant', content: result.response || result.spoken_text || '(no reply)', note: contrarianNote(result.contrarian), trace: buildTrace(result, 'voice') };
        state.messages.push(assistantMessage);
        const speech = result.speech || {};
        if (speech.audio_base64) {
          try {
            const audio = new Audio('data:audio/' + (speech.format || 'mpeg') + ';base64,' + speech.audio_base64);
            audio.addEventListener('playing', () => {
              const speechStoppedAt = clientTiming.speech_stopped_at_ms || clientTiming.request_started_at_ms;
              result.client_playback_started_ms = performance.now() - speechStoppedAt;
              assistantMessage.trace = buildTrace(result, 'voice');
              renderThread();
            }, { once: true });
            audio.play().catch(() => {});
          } catch (e) { /* autoplay blocked */ }
        }
        if (result.speech_error) byId('composerError').textContent = 'Answer ready, but speech failed.';
      } catch (err) {
        byId('composerError').textContent = 'Voice reply failed: ' + err.message;
      } finally {
        state.sending = false; stopTrace(); renderThread();
        renderKicker(new Date().toISOString());
      }
    }

    // ---------- Needs-you rail ----------
    const KIND_LABELS = {
      commitment_overdue: 'Overdue promise', commitment_due_soon: 'Promise due soon',
      approval_pending: 'Needs your word', decision_stale: 'Decision to revisit',
      prediction_due: 'Prediction to score', experiment_review: 'Experiment needs review',
      assumption_unvalidated: 'Unvalidated assumption'
    };
    // His one-liner per kind — the framing, not the metadata.
    const KIND_LINES = {
      commitment_overdue: 'You gave your word. It’s past due.',
      commitment_due_soon: 'Your word comes due soon. I’m watching it.',
      approval_pending: 'It reaches outside these walls.',
      decision_stale: 'This one’s been sitting. Decide, and I move.',
      prediction_due: 'You made a call. Time to grade it.',
      experiment_review: 'The results are in. Look before it drifts.',
      assumption_unvalidated: 'We’re building on a guess. I don’t like guesses.'
    };
    function kindLabel(kind) {
      return KIND_LABELS[kind] || String(kind || '').replace(/_/g, ' ').replace(/^./, (c) => c.toUpperCase());
    }
    function inboxHref(item) {
      const t = ((item.subject_type || '') + ' ' + (item.kind || '')).toLowerCase();
      return uiBase() + 'inbox.html' + (/commitment|promise/.test(t) ? '#promises' : '');
    }
    function attentionHref(item) {
      const href = String(item.href || '');
      if (href.startsWith('/ui/')) return location.pathname.startsWith('/ui') ? href : href.replace(/^\/ui\//, '');
      return href || inboxHref(item);
    }
    let needsItems = [];
    function renderNeeds() {
      byId('needsList').innerHTML = needsItems.length
        ? needsItems.map((item, i) => `
            <div class="needs-row" data-idx="${i}">
              <div class="needs-top">
                <a class="needs-title" href="${attentionHref(item)}">${esc(item.title)}</a>
                <button type="button" class="needs-handle" data-handle="${i}" title="I’ll take it">handle</button>
              </div>
              <div class="needs-line">${esc(KIND_LINES[item.kind] || 'It needs your hand — mine are tied.')}</div>
              <div class="needs-kind">${esc(kindLabel(item.kind))}</div>
            </div>`).join('')
        : `<div class="quiet">
             <div class="quiet-head"><span class="quiet-dot"></span><span class="quiet-label">All clear</span></div>
             <div class="quiet-line">Nothing needs you right now. I swept every corner twice — and I made it quiet. Breathe, Ellie. I’m still here, watching the doors.</div>
           </div>`;
    }
    byId('needsList').addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-handle]');
      if (!btn) return;
      needsItems.splice(Number(btn.dataset.handle), 1);
      renderNeeds();
    });
    async function loadNeeds() {
      let count = null;
      try {
        const scan = await api('/surface/attention');
        needsItems = (scan.items || []).slice(0, 3);
        count = (scan.items || []).length;
        renderNeeds();
      } catch (err) {
        byId('needsList').innerHTML = '<div class="rail-empty">Could not load — ' + esc(err.message) + '</div>';
      }
      renderGreeting(count);
      return count;
    }

    // ---------- Current objective ----------
    async function loadObjective() {
      try {
        const data = await api('/founder/active-objective');
        const item = data.item || {};
        if (!item.id) { byId('objectiveBox').innerHTML = '<div class="objective-note" style="margin-top:0;">No active objective set.</div>'; return; }
        const note = item.next_action || [item.metric, item.target].filter(Boolean).join(' / ') || item.desired_outcome || '';
        byId('objectiveBox').innerHTML = `
          <div class="objective-text">${esc(item.objective)}</div>
          <div class="objective-note">${note ? esc(note) + ' · I’m tracking every one' : 'I’m tracking it.'}</div>`;
      } catch (err) {
        byId('objectiveBox').innerHTML = '<div class="objective-note" style="margin-top:0;">Could not load objective.</div>';
      }
    }

    // ---------- Today strip · away digest · recent decisions · quick actions ----------
    // All ambient loads are plain GETs — the house describes itself without
    // side effects. The only POST here is the explicit Daydream button.
    const relTime = (iso) => {
      const t = new Date(iso).getTime();
      if (!t || Number.isNaN(t)) return '';
      const s = Math.max(0, Math.round((Date.now() - t) / 1000));
      if (s < 60) return 'just now';
      const m = Math.round(s / 60);
      if (m < 60) return m + 'm ago';
      const h = Math.round(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.round(h / 24) + 'd ago';
    };

    async function loadTodayStrip(attentionCount) {
      try {
        const t = await api('/tray/state');
        const unread = Number(t.unread_notifications || 0);
        const pending = Number(t.pending_approvals || 0);
        const bits = [];
        bits.push(attentionCount == null ? '' : `<span${attentionCount ? ' class="hot"' : ''}>${attentionCount} need${attentionCount === 1 ? 's' : ''} you</span>`);
        bits.push(`<a href="surfacing.html"${unread ? ' class="hot"' : ''}>${unread} unread</a>`);
        bits.push(`<a href="approvals.html"${pending ? ' class="hot"' : ''}>${pending} awaiting your word</a>`);
        bits.push(`<span>${t.ollama_ok ? 'models warm' : 'models down'}</span>`);
        byId('todayStrip').innerHTML = bits.filter(Boolean).join('<span class="sep">·</span>');
      } catch (e) { byId('todayStrip').innerHTML = ''; }
    }

    async function loadAway() {
      const box = byId('awayList');
      try {
        const data = await api('/notifications?unread_only=true&limit=3');
        const items = data.items || data.notifications || [];
        box.innerHTML = items.length
          ? items.map((n) => `
              <a class="away-row" href="surfacing.html">
                <div class="away-title">${esc(n.title || '(untitled)')}</div>
                <div class="away-sub">${esc([n.severity, relTime(n.created_at)].filter(Boolean).join(' · '))}</div>
              </a>`).join('') + '<a class="rail-more" href="surfacing.html">everything I noted →</a>'
          : '<div class="rail-empty">Nothing happened that you need to hear about. That’s the job.</div>';
      } catch (err) { box.innerHTML = '<div class="rail-empty">Could not load — ' + esc(err.message) + '</div>'; }
    }

    async function loadDecisions() {
      const box = byId('decisionsList');
      try {
        const data = await api('/founder/decisions?limit=3');
        const items = data.items || [];
        box.innerHTML = items.length
          ? items.map((d) => `
              <a class="decision-row" href="strategy.html">
                <div class="decision-title">${esc(d.title || d.decision || '(untitled)')}</div>
                <div class="decision-sub">${esc([d.status, relTime(d.created_at || d.decided_at)].filter(Boolean).join(' · '))}</div>
              </a>`).join('') + '<a class="rail-more" href="strategy.html">the full ledger →</a>'
          : '<div class="rail-empty">No decisions on record yet. When you make one, I remember it forever.</div>';
      } catch (err) { box.innerHTML = '<div class="rail-empty">Could not load — ' + esc(err.message) + '</div>'; }
    }

    byId('qaDaydream').addEventListener('click', async () => {
      const btn = byId('qaDaydream'); const note = byId('qaNote');
      btn.disabled = true; btn.textContent = 'Daydreaming…'; note.textContent = ''; note.className = 'qa-note';
      try {
        await ensureToken();
        const result = await api('/research/daydream', { method: 'POST', body: JSON.stringify({ limit: 3, notify: true }) });
        const n = result.notified ?? (result.topics || []).length ?? 0;
        note.textContent = n ? 'Done. ' + n + ' thread' + (n === 1 ? '' : 's') + ' worth pulling — they’re in your notifications.' : 'I looked. Nothing worth waking you for.';
        note.className = 'qa-note good';
        loadAway(); loadNeeds().then((count) => loadTodayStrip(count));
      } catch (err) {
        note.textContent = 'Daydream failed: ' + err.message;
      } finally { btn.disabled = false; btn.textContent = 'Daydream'; }
    });

    // ---------- Restore recent conversation ----------
    async function loadRecentConversation() {
      try {
        const data = await api('/conversations?status=active&limit=1');
        const list = data.items || data.conversations || (Array.isArray(data) ? data : []);
        if (!list.length) return;
        const id = list[0].id;
        const turnsData = await api('/conversations/' + encodeURIComponent(id) + '/turns?limit=100');
        const turns = turnsData.turns || [];
        if (!turns.length) return;
        state.conversationId = id;
        state.messages = turns.map((t) => ({ role: t.role === 'assistant' ? 'assistant' : 'founder', content: t.content }));
        const last = turns[turns.length - 1];
        renderKicker(last.created_at || last.at || null);
      } catch (e) { /* start fresh */ }
    }

    // ---------- Boot ----------
    byId('sendBtn').addEventListener('click', sendChat);
    byId('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });
    byId('micBtn').addEventListener('click', toggleMic);
    byId('newThreadBtn').addEventListener('click', newThread);

    renderGreeting(null);
    ensureToken();
    loadRecentConversation().then(renderThread);
    loadNeeds().then((count) => loadTodayStrip(count));
    loadObjective();
    loadAway();
    loadDecisions();
  </script>
  <script src="/ui/zade-ui.js"></script>
</body>
</html>
