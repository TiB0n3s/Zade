<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zade — Home</title>
  <style>
    /* Page-specific layout only. Colors, type, and base components come from
       the shared /ui/zade-ui.css, which loads after this block and wins on the
       body-prefixed cascade. Home is the daily surface: a conversation on the
       left, a quiet "needs you" digest on the right. */
    * { box-sizing: border-box; }
    h1 { margin: 0; }

    /* Full-bleed two-column layout — override main's centered container. */
    body.page-home main { max-width: none; margin: 0; padding: 0; }
    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      min-height: 100dvh;
    }

    /* --- Left: conversation --- */
    .conv { display: flex; flex-direction: column; padding: 44px 40px 28px; min-height: 100dvh; }
    .kicker { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 8px; }
    .conv-head { margin-bottom: 26px; }
    .thread { flex: 1; display: flex; flex-direction: column; gap: 22px; max-width: 680px; overflow-y: auto; padding-right: 6px; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--z-line); }
    .msg-row { display: flex; }
    .msg-row.founder { justify-content: flex-end; }
    .founder-msg { max-width: 520px; font-size: 14.5px; line-height: 1.55; color: var(--z-ink-hi); text-align: right; }
    .zade-msg { max-width: 600px; }
    .zade-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--z-accent-2); margin-bottom: 6px; }
    .zade-text { font-family: var(--z-serif); font-style: italic; font-size: 18px; line-height: 1.5; color: var(--z-text); white-space: pre-wrap; }
    .contrarian { margin-top: 10px; padding: 9px 14px; border-left: 2px solid var(--z-accent-dim); }
    .contrarian-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 3px; }
    .contrarian-text { font-size: 12.5px; color: var(--z-muted); line-height: 1.5; }
    .thinking { font-family: var(--z-serif); font-style: italic; font-size: 15px; color: var(--z-faint); }
    .thread-empty { font-family: var(--z-serif); font-style: italic; font-size: 16px; color: var(--z-faint); }

    /* --- Composer --- */
    .composer { display: flex; gap: 10px; align-items: center; max-width: 680px; }
    .mic {
      width: 40px; height: 40px; flex: none; border-radius: 50%;
      border: 1px solid var(--z-accent-dim); background: transparent; color: var(--z-accent-2);
      display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; min-height: 0;
      transition: border-color .2s, background .2s, color .2s;
    }
    .mic.active { border-color: var(--z-accent-2); background: rgba(176,71,63,0.18); color: var(--z-text); }
    .composer input.chatbox {
      flex: 1; background: var(--z-well); border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      padding: 13px 15px; color: var(--z-ink-hi); font-family: var(--z-sans); font-size: 14px;
    }
    .composer button.send { border-radius: 8px; padding: 12px 18px; min-height: 0; }
    .composer-error { color: var(--z-bad-text); font-size: 11.5px; max-width: 680px; margin-top: 8px; min-height: 14px; }

    /* --- Right: needs-you rail --- */
    .rail { border-left: 1px solid var(--z-line); padding: 44px 28px 32px; }
    .needs-list { display: flex; flex-direction: column; }
    .needs-row { cursor: pointer; padding: 13px 2px; border-top: 1px solid var(--z-line-soft); text-decoration: none; display: block; }
    .needs-list .needs-row:last-child { border-bottom: 1px solid var(--z-line-soft); }
    .needs-title { font-size: 13px; color: var(--z-ink-hi); margin-bottom: 3px; }
    .needs-status { font-size: 11.5px; }
    .needs-status.red { color: var(--z-bad-text); }
    .needs-status.orange { color: var(--z-warn-text); }
    .needs-status.yellow { color: var(--z-faint); }
    .rail-empty { font-size: 12.5px; color: var(--z-faint); padding: 13px 2px; border-top: 1px solid var(--z-line-soft); }
    .objective { margin-top: 30px; }
    .objective-text { font-family: var(--z-serif); font-style: italic; font-size: 16px; color: var(--z-ink-hi); line-height: 1.4; }
    .objective-note { font-size: 11.5px; color: var(--z-faint); margin-top: 6px; }

    /* --- Live step trace (while Zade works) + persistent per-message summary --- */
    .zade-trace { border-left: 2px solid var(--z-accent-dim); padding: 6px 0 6px 16px; margin-bottom: 4px; display: flex; flex-direction: column; gap: 8px; }
    .zade-trace .trace-head { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--z-accent-2); }
    .trace-step { display: flex; align-items: baseline; gap: 10px; }
    .trace-mark { width: 7px; height: 7px; border-radius: 50%; flex: none; position: relative; top: 1px; background: var(--z-ghost); }
    .trace-step.pending .trace-mark { background: transparent; box-shadow: inset 0 0 0 1px var(--z-ghost); }
    .trace-step.done .trace-mark { background: var(--z-ok); }
    .trace-step.active .trace-mark { background: var(--z-accent-2); box-shadow: 0 0 0 0 rgba(208, 125, 116, 0.5); animation: trace-pulse 1.4s ease-out infinite; }
    @keyframes trace-pulse {
      0% { box-shadow: 0 0 0 0 rgba(208, 125, 116, 0.5); }
      70% { box-shadow: 0 0 0 6px rgba(208, 125, 116, 0); }
      100% { box-shadow: 0 0 0 0 rgba(208, 125, 116, 0); }
    }
    .trace-label { font-size: 12.5px; color: var(--z-ink); }
    .trace-step.pending .trace-label { color: var(--z-faint); }
    .trace-step.active .trace-label { color: var(--z-ink-hi); }
    .trace-detail { font-size: 11px; color: var(--z-faint); }

    .trace-summary { margin-top: 12px; }
    .trace-summary > summary { cursor: pointer; list-style: none; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--z-faint); }
    .trace-summary > summary::-webkit-details-marker { display: none; }
    .trace-summary > summary:hover { color: var(--z-ink-hi); }
    .trace-summary .trace-steps { margin-top: 10px; display: flex; flex-direction: column; gap: 7px; }
    .trace-summary .trace-step.ok .trace-mark { background: var(--z-ok); }
    .trace-summary .trace-step.muted .trace-mark { background: transparent; box-shadow: inset 0 0 0 1px var(--z-ghost); }
    .trace-summary .trace-step.warn .trace-mark { background: var(--z-warn); }
    .trace-summary .trace-step.muted .trace-label { color: var(--z-faint); }

    @media (max-width: 899px) {
      .home-grid { grid-template-columns: 1fr; min-height: 0; }
      .conv { min-height: 0; padding: 26px 20px 20px; }
      .rail { border-left: 0; border-top: 1px solid var(--z-line); padding: 24px 20px 40px; }
      .thread { overflow-y: visible; }
    }
  </style>
  <link rel="stylesheet" href="/ui/zade-ui.css">
</head>
<body class="page-home">
  <main class="home">
    <div class="home-grid">
      <!-- Conversation -->
      <section class="conv">
        <div class="conv-head">
          <div class="kicker">Home</div>
          <h1>Talk to Zade</h1>
        </div>
        <div class="composer">
          <button type="button" class="mic" id="micBtn" title="Hold a voice conversation with Zade" aria-label="Voice">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"></rect><path d="M5 10a7 7 0 0 0 14 0"></path><path d="M12 19v3"></path></svg>
          </button>
          <input class="chatbox" id="chatInput" placeholder="Say something to Zade…" autocomplete="off">
          <button type="button" class="send" id="sendBtn">Send</button>
        </div>
        <div class="composer-error" id="composerError"></div>
        <div class="thread" id="thread"></div>
      </section>

      <!-- Needs-you rail -->
      <aside class="rail">
        <div class="kicker">Needs you</div>
        <div class="needs-list" id="needsList"><div class="rail-empty">Checking…</div></div>

        <div class="objective">
          <div class="kicker">Current objective</div>
          <div id="objectiveBox"><div class="rail-empty" style="border:0;padding:0;">Loading…</div></div>
        </div>
      </aside>
    </div>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);
    const token = () => localStorage.getItem('zadeKernelToken') || '';
    const headers = () => token() ? { 'Content-Type': 'application/json', 'X-Zade-Token': token() } : { 'Content-Type': 'application/json' };
    const esc = (v) => String(v == null ? '' : v).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const api = async (path, opts = {}) => {
      const response = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    };
    // Mutations carry X-Zade-Token; make sure it's fetched before the first send.
    async function ensureToken() {
      if (token()) return;
      try { const r = await fetch('/session/token'); if (r.ok) { const d = await r.json(); if (d.token) localStorage.setItem('zadeKernelToken', d.token); } } catch (e) { /* offline */ }
    }
    const uiBase = () => (location.pathname.startsWith('/ui') ? '/ui/' : '');

    let state = { conversationId: null, messages: [], sending: false, micOn: false, trace: null };
    let traceTimer = null;

    // ---------- Conversation ----------
    function renderThread() {
      const t = byId('thread');
      if (!state.messages.length && !state.sending) {
        t.innerHTML = '<div class="thread-empty">Nothing on the thread yet. Ask me what needs your attention, or think out loud.</div>';
        return;
      }
      // Newest-first: the "thinking" placeholder and the latest turn render at
      // the top, right under the composer, so a new reply lands where you type.
      let html = '';
      if (state.sending) html += renderLiveTrace();
      html += [...state.messages].reverse().map(renderMsg).join('');
      t.innerHTML = html;
      t.scrollTop = 0;
    }

    function renderMsg(m) {
      if (m.role === 'assistant') {
        return `
          <div class="msg-row zade">
            <div class="zade-msg">
              <div class="zade-label">Zade</div>
              <div class="zade-text">${esc(m.content)}</div>
              ${m.note ? `<div class="contrarian"><div class="contrarian-label">Contrarian check</div><div class="contrarian-text">${esc(m.note)}</div></div>` : ''}
              ${m.trace ? renderTraceSummary(m.trace) : ''}
            </div>
          </div>`;
      }
      return `<div class="msg-row founder"><div class="founder-msg">${esc(m.content)}</div></div>`;
    }

    // Build the optional "contrarian check" aside from the structured metadata
    // /runtime/respond returns (the critique text itself is already inlined into
    // `response`; this is just the verdict summary).
    function contrarianNote(contrarian) {
      if (!contrarian || contrarian.status === 'error' || !contrarian.verdict) return null;
      const verdict = String(contrarian.verdict).replace(/_/g, ' ');
      const adj = contrarian.confidence_adjustment;
      const adjText = (adj != null && Number(adj) !== 0) ? ` · confidence ${adj > 0 ? '+' : ''}${adj}` : '';
      return `Verdict: ${verdict}${adjText}`;
    }

    // ---------- Live step trace ----------
    // The kernel answers in one synchronous call, so the stages shown while we
    // wait animate through Zade's real pipeline order — they can't stream from
    // the server. The instant the reply lands we swap them for a truthful,
    // persistent summary built entirely from the response payload (never invented).
    const CHAT_STAGES = ['Recalling context', 'Routing skills', 'Drafting reply', 'Reviewing & governing'];
    const VOICE_STAGES = ['Transcribing speech', 'Recalling context', 'Drafting reply', 'Reviewing & governing'];

    function startTrace(mode) {
      const stages = mode === 'voice' ? VOICE_STAGES : CHAT_STAGES;
      const holdIndex = stages.indexOf('Drafting reply');
      state.trace = { stages, active: 0, holdIndex };
      renderThread();
      clearInterval(traceTimer);
      // Advance through the fast pre-draft stages, then hold on "Drafting" — the
      // long local-model call — until the real response arrives.
      traceTimer = setInterval(() => {
        if (!state.trace) { clearInterval(traceTimer); return; }
        if (state.trace.active < state.trace.holdIndex) {
          state.trace.active += 1;
          renderThread();
        } else {
          clearInterval(traceTimer);
        }
      }, 700);
    }

    function stopTrace() {
      clearInterval(traceTimer);
      traceTimer = null;
      state.trace = null;
    }

    function renderLiveTrace() {
      const tr = state.trace;
      if (!tr) return '<div class="thinking">Zade is thinking…</div>';
      const rows = tr.stages.map((label, i) => {
        const cls = i < tr.active ? 'done' : (i === tr.active ? 'active' : 'pending');
        return `<div class="trace-step ${cls}"><span class="trace-mark"></span><span class="trace-label">${esc(label)}</span></div>`;
      }).join('');
      return `<div class="zade-trace live" role="status" aria-live="polite"><div class="trace-head">Zade is working</div>${rows}</div>`;
    }

    function renderTraceSummary(steps) {
      if (!steps || !steps.length) return '';
      const rows = steps.map((s) => `
        <div class="trace-step ${s.state || 'ok'}">
          <span class="trace-mark"></span>
          <span class="trace-label">${esc(s.label)}</span>
          ${s.detail ? `<span class="trace-detail">${esc(s.detail)}</span>` : ''}
        </div>`).join('');
      return `<details class="trace-summary"><summary>How I got here · ${steps.length} steps</summary><div class="trace-steps">${rows}</div></details>`;
    }

    // Reconstruct what actually happened this turn from real response fields:
    // governor.evidence_state (present for chat and voice), skill selection
    // (chat only — voice falls back to the match count), applied governor rules,
    // and the contrarian verdict.
    function buildTrace(result, mode) {
      const gov = result.governor || {};
      const ev = gov.evidence_state || (result.context && result.context.evidence_state) || {};
      const rules = gov.applied_rules || [];
      const skillSel = (result.context && result.context.skill_state && result.context.skill_state.selected) || [];
      const steps = [];

      if (mode === 'voice') {
        const words = String(result.transcript || '').trim().split(/\s+/).filter(Boolean).length;
        steps.push({ label: 'Transcribed speech', detail: words ? words + (words === 1 ? ' word' : ' words') : 'no speech detected', state: words ? 'ok' : 'muted' });
      }

      const mem = Number(ev.memory_hits || 0);
      const sem = Number(ev.semantic_hits || 0);
      steps.push({
        label: 'Recalled memory',
        detail: (mem + sem) ? `${mem} local · ${sem} semantic` : 'nothing relevant on file',
        state: (mem + sem) ? 'ok' : 'muted'
      });

      const skillCount = skillSel.length || Number(ev.skill_matches || 0);
      steps.push({
        label: 'Routed skills',
        detail: skillSel.length ? skillSel.map((s) => s.name).join(', ') : (skillCount ? skillCount + ' matched' : 'none matched'),
        state: skillCount ? 'ok' : 'muted'
      });

      steps.push({ label: 'Drafted reply', detail: result.model || '', state: 'ok' });

      const govBits = [];
      if (rules.includes('charter_recitation_repaired')) govBits.push('repaired charter drift');
      if (rules.includes('repetition_loop_trimmed')) govBits.push('trimmed a repetition loop');
      if (rules.includes('episodic_conversation_memory')) govBits.push('kept conversation continuity');
      if (govBits.length) steps.push({ label: 'Governed', detail: govBits.join(' · '), state: 'ok' });

      const c = result.contrarian;
      if (c && c.status === 'ok') {
        const verdict = String(c.verdict || '').replace(/_/g, ' ').trim();
        const adj = c.confidence_adjustment;
        const adjText = (adj != null && Number(adj) !== 0) ? ` · confidence ${adj > 0 ? '+' : ''}${adj}` : '';
        steps.push({ label: 'Contrarian check', detail: (verdict || 'reviewed') + adjText, state: 'ok' });
      } else if (c && c.status === 'error') {
        steps.push({ label: 'Contrarian check', detail: 'pass failed', state: 'warn' });
      } else {
        steps.push({ label: 'Contrarian check', detail: 'not triggered', state: 'muted' });
      }
      return steps;
    }

    async function ensureConversation() {
      if (state.conversationId) return state.conversationId;
      const c = await api('/conversations', { method: 'POST', body: JSON.stringify({ title: '' }) });
      state.conversationId = c.conversation ? c.conversation.id : (c.item ? c.item.id : c.id);
      return state.conversationId;
    }

    async function sendChat() {
      const text = (byId('chatInput').value || '').trim();
      if (!text || state.sending) return;
      byId('composerError').textContent = '';
      byId('chatInput').value = '';
      state.messages.push({ role: 'founder', content: text });
      state.sending = true;
      startTrace('chat');
      try {
        await ensureToken();
        const conversation_id = await ensureConversation();
        const result = await api('/runtime/respond', {
          method: 'POST',
          body: JSON.stringify({ message: text, conversation_id, use_memory: true, use_semantic_memory: true, use_skills: true })
        });
        state.messages.push({ role: 'assistant', content: result.response || '(no reply)', note: contrarianNote(result.contrarian), trace: buildTrace(result, 'chat') });
      } catch (err) {
        byId('composerError').textContent = 'Zade could not reply: ' + err.message;
      } finally {
        state.sending = false;
        stopTrace();
        renderThread();
      }
    }

    // ---------- Voice ----------
    let media = { rec: null, chunks: [], stream: null };
    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(String(reader.result).split(',')[1] || '');
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }
    async function toggleMic() {
      if (state.micOn) { stopMic(); return; }
      byId('composerError').textContent = '';
      try {
        media.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        byId('composerError').textContent = 'Microphone unavailable: ' + e.message;
        return;
      }
      media.chunks = [];
      media.rec = new MediaRecorder(media.stream);
      media.rec.ondataavailable = (e) => { if (e.data && e.data.size) media.chunks.push(e.data); };
      media.rec.onstop = () => sendRecording(media.rec.mimeType);
      media.rec.start();
      state.micOn = true;
      byId('micBtn').classList.add('active');
      byId('micBtn').title = 'Stop and send';
    }
    function stopMic() {
      state.micOn = false;
      byId('micBtn').classList.remove('active');
      byId('micBtn').title = 'Hold a voice conversation with Zade';
      if (media.rec && media.rec.state !== 'inactive') media.rec.stop();
      if (media.stream) media.stream.getTracks().forEach((t) => t.stop());
    }
    async function sendRecording(mimeType) {
      const blob = new Blob(media.chunks, { type: mimeType || 'audio/webm' });
      if (!blob.size) return;
      state.sending = true; startTrace('voice');
      try {
        await ensureToken();
        const conversation_id = await ensureConversation();
        const audio_base64 = await blobToBase64(blob);
        const result = await api('/voice/converse', {
          method: 'POST',
          body: JSON.stringify({ audio_base64, audio_mime: blob.type || 'audio/webm', conversation_id, use_semantic_memory: true, speak_response: true, speak_full: false })
        });
        state.messages.push({ role: 'founder', content: result.transcript || '(no speech detected)' });
        state.messages.push({ role: 'assistant', content: result.response || result.spoken_text || '(no reply)', note: contrarianNote(result.contrarian), trace: buildTrace(result, 'voice') });
        const speech = result.speech || {};
        if (speech.audio_base64) {
          try { new Audio('data:audio/' + (speech.format || 'mpeg') + ';base64,' + speech.audio_base64).play(); } catch (e) { /* autoplay blocked */ }
        }
        if (result.speech_error) byId('composerError').textContent = 'Answer ready, but speech failed.';
      } catch (err) {
        byId('composerError').textContent = 'Voice reply failed: ' + err.message;
      } finally {
        state.sending = false; stopTrace(); renderThread();
      }
    }

    // ---------- Needs-you rail ----------
    const SEV_LABELS = { red: 'Urgent', orange: 'Important', yellow: 'Worth a look' };
    const KIND_LABELS = {
      commitment_overdue: 'Overdue promise', commitment_due_soon: 'Promise due soon',
      approval_pending: 'Awaiting your approval', decision_stale: 'Decision needs revisiting',
      prediction_due: 'Prediction to score', experiment_review: 'Experiment needs review',
      assumption_unvalidated: 'Unvalidated assumption'
    };
    function kindLabel(kind) {
      return KIND_LABELS[kind] || String(kind || '').replace(/_/g, ' ').replace(/^./, (c) => c.toUpperCase());
    }
    function inboxHref(item) {
      const t = ((item.subject_type || '') + ' ' + (item.kind || '')).toLowerCase();
      let tab = 'decisions';
      if (/commitment|promise/.test(t)) tab = 'promises';
      else if (/plan|action/.test(t)) tab = 'motion';
      return uiBase() + 'inbox.html#' + tab;
    }
    function attentionHref(item) {
      const href = String(item.href || '');
      if (href.startsWith('/ui/')) return location.pathname.startsWith('/ui') ? href : href.replace(/^\/ui\//, '');
      return href || inboxHref(item);
    }
    async function loadNeeds() {
      try {
        const scan = await api('/surface/attention');
        const items = (scan.items || []).slice(0, 3);
        byId('needsList').innerHTML = items.length
          ? items.map((item) => `
              <a class="needs-row" href="${attentionHref(item)}">
                <div class="needs-title">${esc(item.title)}</div>
                <div class="needs-status ${esc(item.severity)}">${esc(SEV_LABELS[item.severity] || 'Note')} · ${esc(kindLabel(item.kind))}</div>
              </a>`).join('')
          : '<div class="rail-empty">Nothing needs you right now. Signals are clear.</div>';
      } catch (err) {
        byId('needsList').innerHTML = '<div class="rail-empty">Could not load — ' + esc(err.message) + '</div>';
      }
    }

    // ---------- Current objective ----------
    async function loadObjective() {
      try {
        const data = await api('/founder/active-objective');
        const item = data.item || {};
        if (!item.id) { byId('objectiveBox').innerHTML = '<div class="objective-note" style="margin-top:0;">No active objective set.</div>'; return; }
        const note = item.next_action || [item.metric, item.target].filter(Boolean).join(' / ') || item.desired_outcome || '';
        byId('objectiveBox').innerHTML = `
          <div class="objective-text">${esc(item.objective)}</div>
          ${note ? `<div class="objective-note">${esc(note)}</div>` : ''}`;
      } catch (err) {
        byId('objectiveBox').innerHTML = '<div class="objective-note" style="margin-top:0;">Could not load objective.</div>';
      }
    }

    // ---------- Restore recent conversation ----------
    async function loadRecentConversation() {
      try {
        const data = await api('/conversations?limit=1');
        const list = data.items || data.conversations || (Array.isArray(data) ? data : []);
        if (!list.length) return;
        const id = list[0].id;
        const turnsData = await api('/conversations/' + encodeURIComponent(id) + '/turns?limit=100');
        const turns = turnsData.turns || [];
        if (!turns.length) return;
        state.conversationId = id;
        state.messages = turns.map((t) => ({ role: t.role === 'assistant' ? 'assistant' : 'founder', content: t.content }));
      } catch (e) { /* start fresh */ }
    }

    // ---------- Boot ----------
    byId('sendBtn').addEventListener('click', sendChat);
    byId('chatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });
    byId('micBtn').addEventListener('click', toggleMic);

    ensureToken();
    loadRecentConversation().then(renderThread);
    loadNeeds();
    loadObjective();
  </script>
  <script src="/ui/zade-ui.js"></script>
</body>
</html>
