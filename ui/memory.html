<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zade — Memory</title>
  <style>
    /* Page-specific layout only; colors/type/components from /ui/zade-ui.css.
       Same scope as before, de-densified: write & search on one tab, connectors
       on another, hairline rows instead of nested boxes. */
    * { box-sizing: border-box; }
    h1 { margin: 0 0 20px; }
    /* prototype controls page inset via .page; drop main's own centered padding */
    body[data-zade-type="sans"] main { max-width: none; margin: 0; padding: 0; }
    .page { padding: 44px 48px 60px; max-width: 820px; }
    .kicker { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 8px; }

    .tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .tabs button { border-radius: 999px; padding: 7px 15px; font-size: 12.5px; min-height: 0; border: 1px solid var(--z-line-strong); color: var(--z-muted); background: transparent; }
    .tabs button.active { border-color: var(--z-accent); background: rgba(194,160,106,0.10); color: var(--z-text); }
    [data-panel][hidden] { display: none; }

    .section { margin-bottom: 24px; }
    .field-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--z-faint); margin-bottom: 10px; }
    .stack input, .stack textarea { width: 100%; margin-bottom: 8px; border-radius: 6px; }
    .stack textarea { resize: vertical; }
    .save-note { font-size: 11.5px; margin-top: 4px; min-height: 14px; }
    .save-note.good { color: var(--z-ok-text); }
    .save-note.err { color: var(--z-bad-text); }

    .result { border-top: 1px solid var(--z-line-soft); padding: 12px 2px; }
    .result-quote { font-size: 13px; color: var(--z-ink); line-height: 1.5; }
    .result-src { color: var(--z-faint); }
    .empty { color: var(--z-faint); font-size: 12.5px; padding: 12px 2px; }

    .row { padding: 13px 2px; border-top: 1px solid var(--z-line-soft); display: flex; justify-content: space-between; align-items: center; gap: 14px; }
    .row-title { font-size: 13.5px; color: var(--z-ink-hi); }
    .row-sub { font-size: 11.5px; color: var(--z-faint); }
    .row-actions { display: flex; gap: 6px; flex: none; }
    .row-actions button { min-height: 26px; padding: 4px 11px; font-size: 11px; }
    .pill.disabled { color: var(--z-muted); background: rgba(255,255,255,0.05); }
    @media (max-width: 720px) { .page { padding: 26px 20px 48px; } }
  </style>
  <link rel="stylesheet" href="/ui/zade-ui.css">
</head>
<body data-zade-type="sans">
  <main>
    <div class="page">
      <div class="kicker">Memory</div>
      <h1>What Zade remembers</h1>

      <div class="tabs">
        <button type="button" data-tab="write" class="active">Write &amp; search</button>
        <button type="button" data-tab="connectors">Connectors · <span id="stagedCount">0</span></button>
      </div>

      <!-- Write & search -->
      <section data-panel="write">
        <div class="section stack">
          <div class="field-label">Write a memory</div>
          <input id="mTitle" placeholder="What should Zade remember?">
          <textarea id="mContent" rows="2" placeholder="Detail (optional)"></textarea>
          <button id="saveBtn" style="border-radius:6px;">Save</button>
          <div class="save-note" id="saveNote"></div>
        </div>
        <div class="section stack">
          <div class="field-label">Search memory</div>
          <input id="searchInput" placeholder="Search by meaning, not just keywords">
          <div id="searchResults"></div>
        </div>
      </section>

      <!-- Connectors -->
      <section data-panel="connectors" hidden>
        <div class="section">
          <div class="field-label">Connected sources</div>
          <div id="connectorsList"><div class="empty">Loading…</div></div>
        </div>
        <div class="section">
          <div class="field-label">Staged — nothing here is used until you import it</div>
          <div id="stagedList"><div class="empty">Loading…</div></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const byId = (id) => document.getElementById(id);
    const token = () => localStorage.getItem('zadeKernelToken') || '';
    (async () => { if (token()) return; try { const r = await fetch('/session/token'); if (r.ok) { const d = await r.json(); if (d.token) localStorage.setItem('zadeKernelToken', d.token); } } catch (e) {} })();
    const headers = () => token() ? { 'Content-Type': 'application/json', 'X-Zade-Token': token() } : { 'Content-Type': 'application/json' };
    const esc = (v) => String(v == null ? '' : v).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const api = async (path, opts = {}) => {
      const response = await fetch(path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } });
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    };
    async function withBusy(btn, label, fn) {
      const original = btn.textContent; btn.disabled = true; btn.textContent = label;
      try { return await fn(); } finally { btn.disabled = false; btn.textContent = original; }
    }
    const prettyLabel = (v) => (v == null || v === '') ? '' : String(v).replace(/_/g, ' ').replace(/^./, (c) => c.toUpperCase());

    // ---- Write ----
    async function saveMemory() {
      const note = byId('saveNote'); note.textContent = ''; note.className = 'save-note';
      const title = byId('mTitle').value.trim();
      const content = byId('mContent').value.trim();
      if (!title && !content) { note.textContent = 'Write something first.'; note.className = 'save-note err'; return; }
      try {
        const result = await api('/memory', { method: 'POST', body: JSON.stringify({ kind: 'note', title, content, source: 'local' }) });
        note.textContent = 'Saved — memory #' + result.memory_id + '.'; note.className = 'save-note good';
        byId('mTitle').value = ''; byId('mContent').value = '';
      } catch (err) { note.textContent = 'Save failed: ' + err.message; note.className = 'save-note err'; }
    }

    // ---- Search ----
    let searchTimer = null;
    async function runSearch() {
      const query = byId('searchInput').value.trim();
      const box = byId('searchResults');
      if (!query) { box.innerHTML = ''; return; }
      try {
        const result = await api('/memory/semantic-search', { method: 'POST', body: JSON.stringify({ query, limit: 8, mode: 'hybrid' }) });
        const matches = result.matches || [];
        box.innerHTML = matches.length ? matches.map(renderMatch).join('') : '<div class="empty">No matches.</div>';
      } catch (err) { box.innerHTML = '<div class="empty">Search failed — ' + esc(err.message) + '</div>'; }
    }
    function renderMatch(m) {
      const quote = m.content || m.text || m.excerpt || m.title || m.document_title || '(no text)';
      const src = [prettyLabel(m.kind), prettyLabel(m.source), m.source_uri].filter(Boolean).join(', ');
      return `<div class="result"><span class="result-quote">"${esc(quote)}"${src ? ` <span class="result-src">— from ${esc(src)}</span>` : ''}</span></div>`;
    }

    // ---- Connectors ----
    async function loadConnectors() {
      try {
        const { items } = await api('/connectors?limit=100');
        byId('connectorsList').innerHTML = (items && items.length)
          ? items.map(renderConnector).join('')
          : '<div class="empty">No connected sources.</div>';
      } catch (err) { byId('connectorsList').innerHTML = '<div class="empty">Could not load — ' + esc(err.message) + '</div>'; }
    }
    function renderConnector(c) {
      const statusText = c.last_sync_status ? prettyLabel(c.last_sync_status) : (c.enabled ? 'Active' : 'Disabled');
      const cls = c.enabled ? (c.last_sync_status === 'error' ? 'error' : 'ok') : 'disabled';
      return `
        <div class="row">
          <div>
            <div class="row-title">${esc(c.name)}</div>
            <div class="row-sub">${esc(prettyLabel(c.connector_type))}${c.description ? ' · ' + esc(c.description) : ''}</div>
          </div>
          <span class="pill ${cls}">${esc(statusText)}</span>
        </div>`;
    }

    async function loadStaged() {
      try {
        const { items } = await api('/connectors/items?status=candidate&limit=100');
        const list = items || [];
        byId('stagedCount').textContent = list.length;
        byId('stagedList').innerHTML = list.length ? list.map(renderStaged).join('') : '<div class="empty">Nothing staged.</div>';
      } catch (err) { byId('stagedList').innerHTML = '<div class="empty">Could not load — ' + esc(err.message) + '</div>'; }
    }
    function renderStaged(item) {
      return `
        <div class="row" data-id="${esc(item.id)}">
          <div>
            <div class="row-title">${esc(item.title || '(untitled)')}</div>
            <div class="row-sub">${esc(prettyLabel(item.item_type))}${item.connector_name ? ' · ' + esc(item.connector_name) : ''}</div>
          </div>
          <div class="row-actions">
            <button class="ok" data-act="import">Import</button>
            <button class="secondary" data-act="dismiss">Dismiss</button>
          </div>
        </div>`;
    }
    byId('stagedList').addEventListener('click', (ev) => {
      const btn = ev.target.closest('button[data-act]');
      if (!btn) return;
      const row = btn.closest('.row');
      const id = Number(row.getAttribute('data-id'));
      withBusy(btn, '…', async () => {
        try {
          if (btn.dataset.act === 'import') {
            await api('/connectors/items/import', { method: 'POST', body: JSON.stringify({ item_ids: [id], create_evidence: true, ingest_documents: true, reliability: 'C', strength: 60 }) });
          } else {
            await api('/connectors/items/' + id + '/dismiss', { method: 'POST', body: JSON.stringify({ reason: 'Dismissed from Zade UI.' }) });
          }
          await loadStaged();
        } catch (err) { row.querySelector('.row-sub').textContent = 'Failed: ' + err.message; }
      });
    });

    // ---- Tabs ----
    const TABS = ['write', 'connectors'];
    function activate(tab) {
      if (!TABS.includes(tab)) tab = 'write';
      document.querySelectorAll('.tabs button').forEach((b) => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('[data-panel]').forEach((p) => { if (p.dataset.panel === tab) p.removeAttribute('hidden'); else p.setAttribute('hidden', ''); });
    }
    document.querySelectorAll('.tabs button').forEach((b) => b.addEventListener('click', () => { location.hash = b.dataset.tab; activate(b.dataset.tab); }));
    window.addEventListener('hashchange', () => activate(location.hash.replace('#', '')));
    activate(location.hash.replace('#', ''));

    byId('saveBtn').addEventListener('click', () => withBusy(byId('saveBtn'), 'Saving…', saveMemory));
    byId('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); runSearch(); } });
    byId('searchInput').addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(runSearch, 450); });

    loadConnectors();
    loadStaged();
  </script>
  <script src="/ui/zade-ui.js"></script>
</body>
</html>
